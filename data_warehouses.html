<p>Автобуската матрица овозможува градење на <span style="color: #59a8fb;"><strong>складиште на податоци на претпријатието постепено</strong></span>, обезбедувајќи процес на деловна вредност по процес, истовремено одржувајќи ја интеграцијата и флексибилноста за идниот раст.</p>
<hr/>
<h2>🌟 Пристапи за моделирање податоци: Ѕвездена шема</h2>
<p>Пристапите за моделирање податоци формираат хиерархиска пирамида, одразувајќи како податоците постепено се рафинираат и оптимизираат за различни цели во рамките на податочната платформа.</p>
<img alt="Пирамида за архитектура на податоци" src="images/datawarehouses/dw-029.png" style="max-width: 500px; margin-left: 0"/>
<p>Оваа пирамида го илустрира протокот од високо структурирани оперативни податоци, преку слоеви на интеграција, до поедноставени аналитички модели за деловна потрошувачка.</p>
<h3>🏛️ База на податоци за трансакции (3NF)</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Управува со секојдневните операции на организацијата (на пр., продажба, инвентар, нарачки).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Тип на податоци</strong></span>: Складира тековни, во реално време и многу детални податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структура</strong></span>: Оптимизиран за CRUD (Креирај, читање, ажурирање, бришење) операции.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Дизајн</strong></span>: Високо <span style="color: #59a8fb;"><strong>нормализиран</strong></span> за да се минимизира вишокот и да се обезбеди интегритет на податоците (обично <span style="color: #59a8fb;"><strong>Трета нормална форма - 3NF</strong></span>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Шема за барање</strong></span>: Првенствено се справува со едноставни, брзи прашања за обработка на трансакции.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изведба</strong></span>: Фокусиран на брзо вметнување податоци и ажурирања наместо на сложени аналитички прашања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Примери</strong></span>: ERP системи, CRM системи, системи за обработка на нарачки.</p></li>
</ul>
<img alt="Трансакциска база на податоци ERD" src="images/datawarehouses/dw-030.png" style="max-width: 500px; margin-left: 0"/>
<h3>🌠 Димензионално моделирање: Ѕвездена шема</h3>
<p>На <span style="color: #59a8fb;"><strong>ѕвездена шема</strong></span> е основен дизајн за складишта на податоци, оптимизирајќи ги податоците за аналитичка обработка.</p>
<img alt="Ѕвездена шема" src="images/datawarehouses/dw-031.png" style="max-width: 500px; margin-left: 0"/>
<h4>Карактеристики на шема на ѕвезди</h4>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Организира податоци во <span style="color: #59a8fb;"><strong>факти и димензии</strong></span> за аналитичка обработка (OLAP).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структура</strong></span>: Централна <span style="color: #59a8fb;"><strong>табела со факти</strong></span> поврзани со повеќе <span style="color: #59a8fb;"><strong>табели со димензии</strong></span>, што личи на форма на ѕвезда.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Табела со факти</strong></span>: чува квантитативни податоци (<span style="color: #59a8fb;"><strong>мерки</strong></span>), како што се продажбата, приходите или количините.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Табели со димензии</strong></span>: Содржи описни атрибути (<span style="color: #59a8fb;"><strong>контекст</strong></span>), на пр., клиент, време, производ.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Нормализација</strong></span>: Типично <span style="color: #59a8fb;"><strong>денормализиран</strong></span> за перформанси во превземање и известување податоци, намалувајќи ја потребата за приклучување.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изведба на барање</strong></span>: Оптимизиран за брзо читање операции и агрегации.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Едноставен дизајн</strong></span>: Лесен за разбирање и барање, погоден за алатки за БИ.</p></li>
</ul>
<h3>❄️ Димензионално моделирање: Шема на снегулка</h3>
<p>На <span style="color: #59a8fb;"><strong>шема на снегулки</strong></span> е понормализирана верзија на ѕвездената шема.</p>
<img alt="Шема на снегулки" src="images/datawarehouses/dw-032.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Понормализирана верзија на ѕвездената шема, која се користи за аналитичка обработка.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структура</strong></span>: Fact table at the center, surrounded by normalized dimension tables, which may have further sub-dimensions. Ова создава структура на разгранување.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Нормализација</strong></span>: Повисоката нормализација (обично 3NF) го намалува вишокот, но може да ги комплицира барањата поради повеќе спојувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Табела со факти</strong></span>: Зачувува квантитативни податоци (на пр., приходи од продажба, продадени единици).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Табели со димензии</strong></span>: Покомплексен и поделен на повеќе поврзани табели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изведба на барање</strong></span>: Може да биде побавно од ѕвездената шема поради зголемените спојувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ефикасност на складирање</strong></span>: Поефикасно за складирање поради намалениот вишок.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пример за употреба</strong></span>: Комплексна аналитика каде што конзистентноста и складирањето на податоците се критични.</p></li>
</ul>
<h3>📊 Табела со факти</h3>
<p>На <span style="color: #59a8fb;"><strong>табела со факти</strong></span> е централната компонента во шемата со ѕвезди или снегулки, која ги складира мерливите деловни метрики.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Содржи мерливи деловни метрики поврзани со настани (продажби, состаноци итн.).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Тип на податоци</strong></span>: Продавници <span style="color: #59a8fb;"><strong>нумерички податоци</strong></span>, како што се приходи од продажба, број на трансакции или добивка.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Грануларност</strong></span>: Дефинирано според нивото на детали на податоците (на пр., дневно, час).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Клучни колони</strong></span>: Содржи <span style="color: #59a8fb;"><strong>странски клучеви</strong></span> табели за димензии (на пр. <code>product_id</code>, <code>time_id</code>, <code>customer_id</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Мерки</strong></span>: Содржи нумерички факти или збирни мерки (на пр., вкупна продажба).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изведба</strong></span>: Оптимизиран за брзо собирање и анализа.</p></li>
</ul>
<img alt="Табела со факти за шема на ѕвезди" src="images/datawarehouses/dw-033.png" style="max-width: 500px; margin-left: 0"/>
<p>Табелата со факти за продажбата содржи странски клучеви за димензии плус нумерички метрики (на пр., приходи, продадени единици) кои ги мерат деловните перформанси.</p>
<h3>🌳 Табела со димензии</h3>
<p><span style="color: #59a8fb;"><strong>Табели со димензии</strong></span> обезбеди описен контекст за фактите во складиште на податоци.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Го опишува контекстот на фактите во складиште на податоци или аналитички модел.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Тип на податоци</strong></span>: Продавници <span style="color: #59a8fb;"><strong>описни, категорични податоци</strong></span> (на пр., имиња на клиенти, категории на производи).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структура</strong></span>: Содржи атрибути кои ги обезбедуваат „димензиите“ за анализа (на пр., време, локација).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Клучеви</strong></span>: Секоја димензионална табела обично се поврзува со табела со факти преку a <span style="color: #59a8fb;"><strong>странски клуч</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Денормализација</strong></span>: Често се денормализира за побрзо барање и едноставност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Примери за колони</strong></span>: Име на клиент, тип на производ, регион, временски период.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Случај за употреба</strong></span>: Им овозможува на корисниците да <span style="color: #59a8fb;"><strong>парчиња и коцки факти</strong></span> според различни атрибути (на пр., продажба по регион, производ).</p></li>
</ul>
<img alt="Односи со табела со димензии" src="images/datawarehouses/dw-034.png" style="max-width: 500px; margin-left: 0"/>
<p>Димензиите производ, продавница, клиент и датум обезбедуваат контекстуални информации, спојувајќи се со фактите за да одговорат на конкретни деловни прашања како месечна популарност на производот или квартални перформанси на продавницата.</p>
<h2>🛠️ Чекори на дизајнирање модел на шема на ѕвезди</h2>
<p>Дизајнирањето на ефективен модел на шема на ѕвезди вклучува систематски пристап:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте го деловниот процес</strong></span>: Дефинирајте ги клучните деловни активности што треба да се анализираат, вклучувајќи ги релевантните метрики, KPI и почетните димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изберете Грануларност</strong></span>: Определете го најниското ниво на детали за вашите податоци. Start at the finest grain, considering trade-offs between storage costs and query performance.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Определете ги димензиите</strong></span>: Дизајнирајте табели со димензии со уникатни, не-нулти примарни клучеви. Овие табели даваат описен контекст за фактите.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Консолидирај ги фактите</strong></span>: Чувајте ги квантитативните метрики и табели за мерење, поврзувајќи ги со табели со димензии користејќи странски клучеви.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изградете шема</strong></span>: Изберете го соодветниот тип на шема (ѕвезда, снегулка или соѕвездие факти) и имплементирајте го, идеално преку инфраструктура како код со автоматизирани тестови.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Оптимизирајте за перформансите на барањето</strong></span>: Индексирајте ја табелата со факти на клучните колони (странски клучеви) за ефикасно барање. Креирајте изведени табели со факти за агрегации на високо ниво.</p></li>
</ol>
<h3>✅ Придобивките од моделите на Star Schema</h3>
<img alt="Придобивки од моделите на Ѕвездена шема" src="images/datawarehouses/dw-035.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Едноставност</strong></span>: Лесен за разбирање и навигација поради неговата јасна, интуитивна структура. Барањата се јасни со минимални спојувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изведба на барање</strong></span>: Оптимизиран за аналитички барања за читање, особено кога се собираат податоци. Денормализираната структура води до побрзи перформанси на барањето и намалена потреба за спојувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Поделба на факти и димензии</strong></span>: Лесно се одржуваат и ажурираат фактите и димензиите независно. Димензиите остануваат стабилни со текот на времето, додека фактите може да се променат или растат.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Приспособливост</strong></span>: Лесно може да се прошири бидејќи може да се додадат нови димензии или факти без значителен редизајн. Great for large datasets with many dimensions and measures.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пристапност на деловни корисници</strong></span>: Едноставната, разбирлива структура е подостапна за деловните аналитичари и не-техничките корисници. Директна поддршка за алатките и контролните табли на Business Intelligence (BI).</p></li>
</ul>
<h3>❌ Недостатоци на моделите на Ѕвездена шема</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Ограничена агилност за промени</strong></span>:</p><ul>
<li><p>Додавањето нови извори или правењето структурни промени може да биде предизвик.</p></li>
<li><p>Промените во деловните барања често бараат редизајн или преструктуирање на шемата.</p></li>
<li><p>Промените на грануларноста на табелата со факти бараат повторно вчитување.</p></li>
<li><p>Историското полнење (насипување) може да биде предизвик.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Комплексност на одржување</strong></span>:</p><ul>
<li><p>Управувањето со големи табели со факти со голем број записи може да стане тешко.</p></li>
<li><p>Обезбедувањето конзистентност меѓу табелите со факти со различни грануларности може да биде сложено.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Потенцијал за прашања за интегритетот на податоците</strong></span>: Ако табелите со димензии не се одржуваат правилно, може да се појават проблеми со интегритетот на податоците, особено со атрибути кои често се менуваат.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Вишок на податоци</strong></span>: Поради денормализација, табелите со димензии може да содржат непотребни податоци, што ќе доведе до повисоки трошоци за складирање. Ажурирањата на атрибутите на димензија бараат ажурирање на повеќе редови.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Не е идеален за обработка во реално време</strong></span>: Оптимизиран за анализа на историски податоци и може да не поддржува обработка на трансакции во реално време или ажурирања со мала латентност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Недостаток на флексибилност за сложени односи</strong></span>: Покомплексните врски многу-до-многу може да биде потешко да се моделираат.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Кошмар за одржување</strong></span>: Напорот и трошоците за одржување на информативните маркети може значително да се зголемат со текот на времето.</p></li>
</ul>
<img alt="Фактори на сложеност на ETL" src="images/datawarehouses/dw-036.png" style="max-width: 500px; margin-left: 0"/>

<h1>🌳 Димензионално моделирање: табели со димензии</h1>
<p>Табелите со димензии се клучни во димензионалното моделирање, обезбедувајќи описен контекст за фактите во складиштето на податоци. Тие претставуваат субјекти релевантни за деловните и аналитичките барања, како што се производи, луѓе, места, датуми и времиња.</p>
<h2>📝 Разбирање на табелите со димензии</h2>
<p>Во димензионален модел, а <span style="color: #59a8fb;"><strong>маса за димензии</strong></span> опишува ентитет релевантен за вашиот бизнис и барањата за аналитика. Овие табели обично претставуваат:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Што</strong></span>: Продадени или произведени артикли.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Каде</strong></span>: Локации, региони, продавници.</p></li>
<li><p><span style="color: #59a8fb;"><strong>СЗО</strong></span>: Клиенти, вработени, продавачи.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Кога</strong></span>: датуми и временски печати на настани.</p></li>
</ul>
<p>Табелите со димензии често се префикс со <code>d_</code> или <code>Dim_</code> за лесна идентификација.</p>
<img alt="Шема на ѕвезди со табели со димензии" src="images/datawarehouses/dw-037.png" style="max-width: 500px; margin-left: 0"/>
<p>Пример <code>d_Salesperson</code> структура на маса:</p>
<pre><code class="language-sql">CREATE TABLE d_Salesperson (
    Salesperson_SK INT NOT NULL, -- Surrogate key
    EmployeeID VARCHAR(20) NOT NULL, -- Natural key(s)
    FirstName VARCHAR(20) NOT NULL,
    -- ... other dimension attributes
    SalesRegion_FK INT NOT NULL, -- Foreign key(s) to other dimensions
    -- Historical tracking attributes (SCD type 2)
    RecChangeDate_FK INT NOT NULL,
    RecValidFromKey INT NOT NULL,
    RecValidToKey INT NOT NULL,
    RecReason VARCHAR(15) NOT NULL,
    RecIsCurrent BIT NOT NULL,
    -- Audit attributes
    AuditMissing BIT NOT NULL,
    AuditIsInferred BIT NOT NULL,
    AuditCreatedDate DATE NOT NULL,
    AuditCreatedBy VARCHAR(15) NOT NULL,
    AuditLastModifiedDate DATE NOT NULL,
    AuditLastModifiedBy VARCHAR(15) NOT NULL
);</code></pre>
<h2>🔑 Сурогат клучеви: Фондацијата</h2>
<p>А <span style="color: #59a8fb;"><strong>сурогат клуч</strong></span> is a single-column unique identifier, generated and stored in the dimension table. Служи како примарен клуч за поврзување со други табели во димензионалниот модел.</p>
<h3>Клучни придобивки</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Консолидирај повеќе извори на податоци</strong></span> без судири на идентификаторите.</p></li>
<li><p>Претворете ги природните клучеви со повеќе колони во ефикасни <span style="color: #59a8fb;"><strong>копчиња со една колона</strong></span>.</p></li>
<li><p>Следете ја историјата на димензиите со <span style="color: #59a8fb;"><strong>SCD тип 2</strong></span>.</p></li>
<li><p>Оптимизирајте го складирањето на табелите со факти со најмал можен тип на податоци со цели броеви.</p></li>
</ul>
<h3>Најдобра практика</h3>
<p>Колона за сурогат клуч се препорачува дури и кога природниот клуч изгледа прифатлив. Избегнувајте да им давате значење на клучните вредности, освен копчињата за димензија на датум и време.</p>
<h3>Пристапи за генерирање на сурогат клучеви на димензија</h3>
<table>
<tr><th><p>Пристап</p></th><th><p>Добрите</p></th><th><p>Конс</p></th></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Хаш на деловниот (природен) клуч</strong></span> (на пр., SHA256 или MD5)</p></td><td><p>Може да се обработи во дистрибуирана средина; Повторните вчитувања ги генерираат истите вредности; Не бара спојување со димензии за да се идентификува сурогат клучот при вчитување табели со факти</p></td><td style="background: #FFF4E6;"><p>Бара деловниот клуч да е стабилен; Не е толку лесен за користење како клучевите INT</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Генерирајте GUID</strong></span> (Глобално единствен идентификатор)</p></td><td><p>Може да се обработи во дистрибуирана средина</p></td><td style="background: #FFF4E6;"><p>Потребни се спојувања со димензии за да се вчитаат табели со факти; Не е толку лесен за користење како клучевите INT; Повторното вчитување генерира нови вредности, па ако табела со димензии повторно се вчита, сите табели со факти што ја упатуваат треба да се вчитаат повторно.</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Генерирајте автоматско зголемена вредност</strong></span> (колона за идентитет)</p></td><td><p>Вредности погодни за корисникот (инженерот); Олеснува поефикасно нарачување со INT што одговара на секвенцата на вчитување</p></td><td style="background: #FFF4E6;"><p>Потребни се спојувања со димензии за да се вчитаат табели со факти; Повторното вчитување генерира нови вредности, па ако табела со димензии повторно се вчита, сите табели со факти што ја упатуваат треба да се вчитаат повторно; Неефикасно да се генерира во дистрибуирани средини</p></td></tr>
</table>
<p><span style="color: #59a8fb;"><strong>Внимание</strong></span>: Никогаш не вршете скратување и целосно повторно вчитување на табела со димензии со автоматски генерирани сурогат клучеви ако е референцирана од табели со факти или поддржува промени SCD тип 2.</p>
<h2>🗑️ Бришење на членови со димензии</h2>
<ul>
<li><p>Избегнувајте синхронизирање бришења со табелата со димензии, освен ако членовите не се создадени по грешка и немаат поврзани записи со факти.</p></li>
</ul>
<h3>Пристап за меко бришење</h3>
<p>Означете ги членовите на димензијата како повеќе неактивни или валидни со помош на Булова атрибут (на пр. <code>IsDeleted</code> или <code>IsActive</code>). Ажурирајте ја оваа колона на <code>TRUE</code> (1) за избришани членови.</p>
<h3>Следење на тековната верзија</h3>
<p>Тековната, најнова верзија на член на димензија може да се означи со Булова (<code>bit</code>) вредност во <code>IsCurrent</code> или <code>IsActive</code> колони.</p>
<h3>Филтри за известување</h3>
<p>Сите барања за известување и семантичките модели на Power BI треба да ги филтрираат меко избришаните записи за одржување <span style="color: #59a8fb;"><strong>интегритетот на податоците</strong></span>.</p>
<h2>🕵️ Ревизорски атрибути</h2>
<p><span style="color: #59a8fb;"><strong>Ревизорски атрибути</strong></span> се опционални, но многу се препорачуваат. Тие следат кога и како се креирани или изменети записите за димензија и може да вклучуваат дијагностички информации од ETL процесите.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Временско следење</strong></span>: Следете кој (и каков процес) ажурирал ред и кога.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Дијагностика</strong></span>: Помогнете да се дијагностицираат предизвикувачки проблеми, како кога процесот на ETL неочекувано запира.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Знамиња за квалитет</strong></span>: Означете ги членовите на димензијата како грешки или заклучените членови за следење на квалитетот на податоците.</p></li>
</ul>
<h2>📏 Разгледувања за големината на табелата со димензии</h2>
<p>Најкорисните и разноврсни димензии се често <span style="color: #59a8fb;"><strong>големи, широки димензии</strong></span> (милиони + редови, стотици атрибути). Големината не е примарна грижа; она што е важно е дека димензијата го поддржува потребното филтрирање, групирање и точна историска анализа.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Големи димензии</strong></span>: Извор од повеќе системи, кои бараат комбинирање, спојување, дедупликација и стандардизирање на податоци при доделување сурогат клучеви.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Мали димензии</strong></span>: Мали табели за пребарување со малку записи и атрибути, кои често ги складираат вредностите на категоријата.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Совет за консолидација</strong></span>: Кога постојат многу мали димензии, размислете да ги консолидирате во a <span style="color: #59a8fb;"><strong>ѓубре димензија</strong></span> да се намали нередот и да се подобри ефикасноста.</p></li>
</ul>
<h2>⚖️ Денормализација наспроти нормализација</h2>
<img alt="Денормализација наспроти нормализација во складирање податоци" src="images/datawarehouses/dw-038.png" style="max-width: 500px; margin-left: 0"/>
<h3>Димензии на снегулка</h3>
<p>А <span style="color: #59a8fb;"><strong>димензија на снегулка</strong></span> е нормализирана димензија, складирање податоци низ неколку поврзани табели.</p>
<h4>Кога да се користат димензиите на снегулката</h4>
<ul>
<li><p>Димензијата е исклучително голема, и <span style="color: #59a8fb;"><strong>трошоците за складирање ги надминуваат потребите за изведба на барањето</strong></span>.</p></li>
<li><p>Ви требаат клучеви за да ја поврзете димензијата со фактите со повисоко зрно.</p></li>
<li><p>Треба да ги следите историските промени на повисоки нивоа на грануларност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>важно</strong></span>: Хиерархија во семантички модел може да се заснова само на колони од една табела. Димензијата на снегулка треба да даде a <span style="color: #59a8fb;"><strong>денормализиран резултат со користење на поглед</strong></span> што ги спојува масите со снегулки заедно.</p></li>
</ul>
<img alt="Пример за димензија на снегулка" src="images/datawarehouses/dw-039.png" style="max-width: 500px; margin-left: 0"/>
<p>Дијаграмот прикажува димензија на снегулка која содржи три поврзани табели со димензии: Производ, Поткатегорија и Категорија, секоја со специфични атрибути на ниво на грануларност.</p>
<h2>🌲 Разбирање на хиерархиите</h2>
<p>Колоните со димензии најчесто произведуваат <span style="color: #59a8fb;"><strong>хиерархии</strong></span> кои овозможуваат истражување на податоците на различни нивоа на сумирање (на пр., намалување од годишна на квартална продажба).</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Единечна денормализирана димензија</strong></span>: Колони од една табела што ги чуваат сите нивоа на хиерархија.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Димензии на снегулка</strong></span>: Повеќе поврзани табели кои формираат нивоа на хиерархија.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Однос родител-дете</strong></span>: Самореференциска димензија за неурамнотежени хиерархии.</p></li>
</ul>
<p>Хиерархиите можат да бидат <span style="color: #59a8fb;"><strong>избалансиран</strong></span>, <span style="color: #59a8fb;"><strong>неурамнотежен</strong></span>, или <span style="color: #59a8fb;"><strong>парталав</strong></span>.</p>
<h3>Балансирани хиерархии</h3>
<p><span style="color: #59a8fb;"><strong>Балансирани хиерархии</strong></span> се најчести, имаат ист број на нивоа во сите гранки.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Вообичаени примери</strong></span>:</p><ul>
<li><p>Календарска хиерархија: Година <span>$\десно стрелка$</span> четвртина <span>$\десно стрелка$</span> Месец <span>$\десно стрелка$</span> Датум</p></li>
<li><p>Географија хиерархија: Земја <span>$\десно стрелка$</span> држава <span>$\десно стрелка$</span> Градот</p></li>
<li><p>Хиерархија на производи: Категорија <span>$\десно стрелка$</span> Поткатегорија <span>$\десно стрелка$</span> Производ</p></li>
</ul></li>
<li><p>Нивоата се засноваат на колони од една, денормализирана димензија или од табели што формираат димензија на снегулка.</p></li>
<li><p>Фактите секогаш се однесуваат на едно ниво, обично најниското, што дозволува фактите да се соберат (навиваат) на највисоко ниво.</p></li>
</ul>
<img alt="Пример за балансирана хиерархија" src="images/datawarehouses/dw-040.png" style="max-width: 500px; margin-left: 0"/>
<h3>Неурамнотежени хиерархии</h3>
<p><span style="color: #59a8fb;"><strong>Неизбалансирани хиерархии</strong></span> се поретки и имаат нивоа засновани на односот родител-дете. Бројот на нивоа се одредува според редовите на димензиите, а не специфичните колони, што значи дека различните гранки можат да имаат различни длабочини.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Вообичаени примери</strong></span>: Хиерархии на вработени (структури за известување), сметка за материјали, модели на сопственост на компанијата, сметки во главната книга.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Препорака</strong></span>: Натурализирајте ја хиерархијата со трансформирање и складирање на нивоата на хиерархија како колони во димензијата.</p></li>
</ul>
<img alt="Пример за неурамнотежена хиерархија" src="images/datawarehouses/dw-041.png" style="max-width: 500px; margin-left: 0"/>
<h3>Парталави хиерархии</h3>
<p>Хиерархија е <span style="color: #59a8fb;"><strong>парталав</strong></span> кога родител на член постои на ниво кое не е веднаш над него. Вредностите на нивоата што недостасуваат ја повторуваат вредноста на родителот.</p>
<ul>
<li><p>Пример: Во географската хиерархија, Нов Зеланд може да нема држави. Вредноста на земјата („Нов Зеланд“) ќе се повтори во <code>StateProvince</code> колона.</p></li>
</ul>
<img alt="Пример за парталава хиерархија" src="images/datawarehouses/dw-042.png" style="max-width: 500px; margin-left: 0"/>
<h2>⏳ Управување со историските промени</h2>
<p><span style="color: #59a8fb;"><strong>Полека менување на димензиите (SCD)</strong></span> се механизми за управување со тоа како со текот на времето се постапува со промените на податоците за димензиите, зачувувајќи го историскиот контекст.</p>
<img alt="Видови SCD" src="images/datawarehouses/dw-043.png" style="max-width: 500px; margin-left: 0"/>
<h3>SCD Тип 1: Презапишете</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Акција</strong></span>: Го препишува постојниот ред со димензии, бидејќи нема потреба да ги следите промените. Се користи и за поправање на грешки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Влијание</strong></span>: <span style="color: #59a8fb;"><strong>Не е зачувана историја</strong></span>. Постојниот ред е ажуриран, што може да резултира со различни агрегации на повисоко ниво за историски податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Ако некој продавач е назначен во нов регион, историските продажби ќе се наполнат во новиот регион како секогаш да биле назначени таму.</p></li>
</ul>
<img alt="SCD тип 1 Пример" src="images/datawarehouses/dw-044.png" style="max-width: 500px; margin-left: 0"/>
<h3>SCD Тип 2: Верзија</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Акција</strong></span>: Вметнува нов ред што претставува временска верзија на член на димензија. Секогаш има актуелна верзија.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Клучни барања</strong></span>: Бара a <span style="color: #59a8fb;"><strong>сурогат клуч</strong></span> бидејќи ќе има дупликат природни клучеви. Историски атрибути за следење (на пр. <code>RecValidFromKey</code>, <code>RecValidToKey</code>, <code>RecIsCurrent</code>) чувајте ги периодите на важност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Влијание</strong></span>: <span style="color: #59a8fb;"><strong>Зачувана е целосна историја</strong></span>. Грануларноста на табелите поврзани со факти е на ниво на верзија на член, што овозможува историските резултати правилно да се соберат, но аналитичарите мора да се движат во повеќе верзии на членови.</p></li>
</ul>
<img alt="SCD тип 2 Пример" src="images/datawarehouses/dw-045.png" style="max-width: 500px; margin-left: 0"/>
<h4>Детали за имплементација на SCD тип 2</h4>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Ажурирајте ја тековната верзија</strong></span>: Поставете го датумот на крајна важност на датумот на обработка на ETL и тековното знаменце на <code>FALSE</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Вметнете нова верзија</strong></span>: Поставете го датумот на важење на почетокот на претходниот датум на завршување и тековното знаменце на <code>TRUE</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Биланс</strong></span>: Избегнувајте премногу промени на SCD тип 2 на димензија, бидејќи тоа може да ја комплицира анализата. Наместо тоа, размислете за додавање атрибути кои често се менуваат во табелата со факти.</p></li>
</ul>
<h3>SCD Тип 3: Ограничена историја</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Акција</strong></span>: Ја следи ограничената историја со зачувување на претходните и тековните вредности во посебни колони.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Случај за употреба</strong></span>: Корисно кога треба само да го зачувате <span style="color: #59a8fb;"><strong>најновата промена</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Механизам</strong></span>: Го препишува редот со димензија додека ја задржува претходната вредност во посветена колона (на пр. <code>PreviousSalesRegion</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ограничувања</strong></span>: Не е практично во реалниот живот поради честите промени на шемата потребни за следење на новите колони. Не се користи најчесто во семантички модели.</p></li>
</ul>
<h2>📅 Димензија на датум</h2>
<p>На <span style="color: #59a8fb;"><strong>димензија на датум (или календар).</strong></span> е најчестата димензија, зачувува еден ред по датум и поддржува филтрирање/групирање по точки.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Природен клуч</strong></span>: Треба да го користите <code>DATE</code> тип на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сурогат клуч</strong></span>: Треба да го зачувате датумот во <span style="color: #59a8fb;"><strong>YYYYMMDD формат</strong></span> користејќи го <code>INT</code> тип на податоци, што го прави читлив за луѓе, ефикасен и усогласен со ISO 8601.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Атрибути</strong></span>: Вклучува колони за година, квартал, месец, ден, седмица од годината, IsHoliday, HolidayText, IsWeekday, LastDayOfMonth и релативни поместувања (на пр. <code>RelativeMonthOffset</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Население</strong></span>: Generated beforehand (e.g., 100 years * 365 = 36,500 rows) and rarely modified. Треба да вклучи идни датуми за цели или прогнози.</p></li>
</ul>
<img alt="Датум Димензија Вчитување" src="images/datawarehouses/dw-046.png" style="max-width: 500px; margin-left: 0"/>
<h2>⏰ Временска димензија</h2>
<p>Кога фактите бараат анализа во одреден момент во времето, посветено <span style="color: #59a8fb;"><strong>временска (или часовник) димензија</strong></span> е од суштинско значење.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Грануларност</strong></span>: Може да се движи од минути (1.440 редови) до секунди (86.400 редови).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Природен клуч</strong></span>: Треба да го користите <code>TIME</code> тип на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сурогат клуч</strong></span>: Размислете за човек читлив <code>INT</code> формат како <code>HHMM</code> или <code>HHMMSS</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Атрибути</strong></span>: Вклучува час, половина час, четврт час, минута, етикети за временски период (наутро, попладне), имиња на работни смени и знаменца за врв/не шпиц.</p></li>
<li><p><span style="color: #59a8fb;"><strong>важно</strong></span>: Димензијата на датум треба <span style="color: #59a8fb;"><strong>не</strong></span> вклучуваат зрно што се протега до време од денот. Користете и димензија на датум и посебна временска димензија.</p></li>
</ul>
<h2>🤝 Усогласени димензии</h2>
<p><span style="color: #59a8fb;"><strong>Усогласени димензии</strong></span> се споделуваат на повеќе табели со факти, обезбедувајќи конзистентност и намалувајќи го напорот за развој.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Вообичаени примери</strong></span>: Димензии на датумот (се користат во скоро сите табели со факти) и димензии на производот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Придобивка</strong></span>: Обезбедува конзистентна анализа на податоци во различни деловни области.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Преклопување на ентитети</strong></span>: Кога ентитетите се преклопуваат (на пр., вработени кои се исто така корисници на системот), комбинирајте ги нивните атрибути во една усогласена димензија.</p></li>
</ul>
<img alt="Пример за усогласени димензии" src="images/datawarehouses/dw-047.png" style="max-width: 500px; margin-left: 0"/>
<h2>🌌 Соѕвездија на факти и шеми на галаксијата</h2>
<h3>Шема на констелација на факти</h3>
<p>А <span style="color: #59a8fb;"><strong>шема на соѕвездија</strong></span> се состои од збир на шеми со ѕвезди со <span style="color: #59a8fb;"><strong>хиерархиски поврзани табели со факти</strong></span>.</p>
<ul>
<li><p>Врските помеѓу различни табели со факти обезбедуваат можност за „дупчење“ помеѓу нивоата на детали (на пр., од продажба до ставка за продажба).</p></li>
</ul>
<img alt="Пример за шема на констелација на факти" src="images/datawarehouses/dw-048.png" style="max-width: 500px; margin-left: 0"/>
<h3>Факт Галакси Шема</h3>
<p>Поопшто, збир на шеми на ѕвезди или соѕвездија може да се комбинираат за да формираат a <span style="color: #59a8fb;"><strong>галаксија</strong></span>.</p>
<ul>
<li><p>Галаксија е збирка шеми на ѕвезди со заеднички димензии.</p></li>
<li><p>За разлика од шемата на соѕвездието, табелите со факти во галаксијата навистина го прават <span style="color: #59a8fb;"><strong>не</strong></span> треба да бидат директно поврзани.</p></li>
</ul>
<img alt="Факт Галакси Шема Пример" src="images/datawarehouses/dw-049.png" style="max-width: 500px; margin-left: 0"/>
<h2>🎭 Димензии на играње улоги</h2>
<p>А <span style="color: #59a8fb;"><strong>димензија на играње улоги</strong></span> се случува кога димензијата се референцира повеќе пати во табела со факти, при што секоја референца претставува посебна улога.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Табела со факти за продажба може да има <code>OrderDate_Date_FK</code>, <code>ShipDate_Date_FK</code>, и <code>DeliveryDate_Date_FK</code> клучеви, сите се однесуваат на истата физичка димензија на датум.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Друг пример</strong></span>: Аеродромска димензија поврзана двапати со табела со факти за лет како <code>Departure Airport</code> и <code>Arrival Airport</code>.</p></li>
</ul>
<img alt="Пример за димензии на играње улоги" src="images/datawarehouses/dw-050.png" style="max-width: 500px; margin-left: 0"/>
<h2>🗑️ Несакани димензии</h2>
<p>А <span style="color: #59a8fb;"><strong>ѓубре димензија</strong></span> консолидира многу мали димензии во една димензија. It is useful when there are many independent dimensions with few attributes and low cardinality.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Придобивки</strong></span>:</p><ul>
<li><p>Намалете го бројот на димензии.</p></li>
<li><p>Намалете ги копчињата за табели со факти и големината на складирањето.</p></li>
<li><p>Намалете го нередот на окното за податоци.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Добри кандидати</strong></span>: Знамиња и индикатори, статус на нарачка, демографски состојби на клиентите (пол, возрасна група).</p></li>
<li><p>Табелата за димензија на ѓубре обично ги складира <span style="color: #59a8fb;"><strong>Декартов производ</strong></span> од сите вредности на атрибутот на димензијата со сурогат клуч.</p></li>
</ul>
<img alt="Пример за несакана димензија" src="images/datawarehouses/dw-051.png" style="max-width: 500px; margin-left: 0"/>
<h2>👻 Дегенерирани димензии</h2>
<p>А <span style="color: #59a8fb;"><strong>дегенерирана димензија</strong></span> occurs when the dimension is at the same grain as the related facts. Вообичаен пример е димензијата на бројот на нарачки за продажба која се однесува на табела со факти за продажба.</p>
<ul>
<li><p>Typically, the invoice number is a single, non-hierarchical attribute in the fact table. Прифатена практика е да не се копираат овие податоци за да се создаде посебна табела со димензии.</p></li>
<li><p>Можете да креирате а <span style="color: #59a8fb;"><strong>поглед</strong></span> во магацин за ткаенини што ја прикажува дегенерираната димензија како димензија за цели на барање.</p></li>
</ul>
<img alt="Пример за дегенерирана димензија" src="images/datawarehouses/dw-052.png" style="max-width: 500px; margin-left: 0"/>
<h2>⛵ Димензии на аутригер</h2>
<p>Кога табела со димензии се однесува на други табели со димензии, таа е позната како an <span style="color: #59a8fb;"><strong>димензија на потпора</strong></span>. Димензијата на потпора помага да се усогласат и повторно да се користат дефинициите во димензионалниот модел.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Географска димензија што ги складира географските локации за секој поштенски код, референцирани и според димензиите на купувачот и на продавачот. Ова обезбедува конзистентни географски локации за анализа.</p></li>
<li><p>Димензијата на датумот може да се користи како димензија на подигање кога другата табела со димензии ги атрибуира датумите на складирање (на пр., датум на раѓање во димензија на клиент користејќи го сурогат клучот на димензијата на датум).</p></li>
</ul>
<img alt="Пример за димензија на аутригер" src="images/datawarehouses/dw-053.png" style="max-width: 500px; margin-left: 0"/>
<h2>↔️ Повеќевредни димензии</h2>
<p>Кога атрибутот за димензија мора да складира повеќе вредности, имплементирате a <span style="color: #59a8fb;"><strong>повеќевредносна димензија</strong></span> користејќи а <span style="color: #59a8fb;"><strong>табела за мост (или спојна маса)</strong></span> за складирање на односот многу-на-многу помеѓу ентитетите.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Ако продавачите може да се доделат во повеќе продажни региони, табела за мост ја складира секоја врска продавач-регион, создавајќи логичен однос многу-на-многу.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Практичен пристап</strong></span>: Имајте директни странски клучеви (FK) од табелата со факти до сите комбинации кои произлегуваат од врската многу-на-многу (на пр., FKs и кон клиентот и кон сметката).</p></li>
</ul>
<img alt="Пример за повеќевредни димензии" src="images/datawarehouses/dw-054.png" style="max-width: 500px; margin-left: 0"/>
<h2>🎯 Димензии: Клучни производи за носење</h2>
<h3>Принципи за дизајн</h3>
<ul>
<li><p>Користете <span style="color: #59a8fb;"><strong>сурогат клучеви</strong></span> за сите димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Денормализирај</strong></span> за перформанси и употребливост.</p></li>
<li><p>Вклучи <span style="color: #59a8fb;"><strong>ревизорски атрибути</strong></span> за следење.</p></li>
<li><p>Балансирајте ги потребите за историско следење со сложеноста.</p></li>
</ul>
<h3>Заеднички обрасци</h3>
<ul>
<li><p>Спроведување <span style="color: #59a8fb;"><strong>димензии на датумот и времето</strong></span> за временска анализа.</p></li>
<li><p>Користете <span style="color: #59a8fb;"><strong>усогласени димензии</strong></span> за конзистентност.</p></li>
<li><p>Пријавете се <span style="color: #59a8fb;"><strong>Видови SCD</strong></span> врз основа на деловните барања.</p></li>
<li><p>Левериџ <span style="color: #59a8fb;"><strong>димензии на играње улоги</strong></span> кога е соодветно.</p></li>
</ul>
<h3>Посебни размислувања</h3>
<ul>
<li><p>Консолидирајте мали димензии во <span style="color: #59a8fb;"><strong>ѓубре димензии</strong></span>.</p></li>
<li><p>Натурализирај <span style="color: #59a8fb;"><strong>неизбалансирани хиерархии</strong></span> кога е можно.</p></li>
<li><p>Користете <span style="color: #59a8fb;"><strong>мостови маси</strong></span> за многу-до-многу врски.</p></li>
<li><p>Креирај <span style="color: #59a8fb;"><strong>ставови</strong></span> за дегенерирани димензии.</p></li>
</ul>
<hr/>
<h1>🏷️ Димензионално моделирање: Класификација на ентитети</h1>
<p>Класификацијата на ентитетите е првиот чекор во конвертирањето на моделот за односи со ентитетот (ER) во димензионален модел за аналитика и известување. Целта е да се разбере улогата што секој ентитет ја игра во анализата и да се подготви за градење табели за факти и димензии во шема со ѕвезди.</p>
<h2>📈 Чекор 1: Преглед на класифицирани ентитети</h2>
<ul>
<li><p>Оваа почетна фаза помага да се трансформираат сложените оперативни модели во поедноставени аналитички модели.</p></li>
<li><p>Ентитетите се класифицирани во три различни категории врз основа на тоа како тие ја претставуваат деловната активност и контекстот: <span style="color: #59a8fb;"><strong>Трансакции, компоненти и ентитети за класификација</strong></span>.</p></li>
</ul>
<h3>Зошто е важна класификацијата</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте деловни настани</strong></span>: Помага прецизно да се одреди кои деловни настани сакаат да ги анализираат и следат носителите на одлуки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структурни шеми на ѕвезди</strong></span>: Обезбедува јасна структура за организирање табели со факти и табели со димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Поедноставување на модели</strong></span>: Ги поедноставува сложените оперативни модели за аналитичка употреба додека го зачувува суштинското деловно значење.</p></li>
</ul>
<h2>💰 Трансакциски субјекти</h2>
<p><span style="color: #59a8fb;"><strong>Трансакциски субјекти</strong></span> снимајте детали за конкретни деловни настани што се случуваат во одреден момент. Овие настани обично се примарен фокус на анализата и претставуваат мерливи активности.</p>
<h3>Клучни карактеристики</h3>
<ul>
<li><p>Опишете настан што се случува на а <span style="color: #59a8fb;"><strong>конкретен момент во времето</strong></span>.</p></li>
<li><p>Содржи <span style="color: #59a8fb;"><strong>мерења или количини</strong></span> (на пр., износи во долари, тежини, волумени, брои).</p></li>
<li><p>Повеќето <span style="color: #59a8fb;"><strong>многу-до-многу врски</strong></span> претставуваат трансакциски субјекти.</p></li>
</ul>
<h3>Улога во димензионално моделирање</h3>
<ul>
<li><p>Трансакциски субјекти се <span style="color: #59a8fb;"><strong>најважно</strong></span> во складиште за податоци.</p></li>
<li><p>Тие ја формираат основата за изградба <span style="color: #59a8fb;"><strong>табели со факти</strong></span> во шеми на ѕвезди.</p></li>
<li><p>Потребен е внес на корисникот за да се идентификуваат кои трансакции се релевантни за аналитичките барања.</p></li>
</ul>
<h3>Вообичаени примери</h3>
<table>
<tr><th><p>Нарачки</p></th><th><p>Побарувања од осигурување</p></th></tr>
<tr><td style="background: #FFF4E6;"><p>Трансакции за купување од купувачи со ставки и збирки</p></td><td><p>Поднесени барања со износи и детали за обработка</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Исплати на плата</p></td><td><p>Резервации за хотели</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Трансакции на платен список со износи и датуми на плаќање</p></td><td><p>Настани за резервации со цени и времетраење на престојот</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Присуство</p></td><td><p>Најавете се</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Влегување во соба</p></td><td><p>Секој настан за најавување и одјавување во систем</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>IoT мерења</p></td><td><p>Обид за испит</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Мерење на одредена вредност со сензор во кој било момент од времето</p></td><td><p>Секој обид за испит, дури и неуспешен, е настан</p></td></tr>
</table>
<h2>🧩 Ентитети на компоненти</h2>
<p><span style="color: #59a8fb;"><strong>Компонентни ентитети</strong></span> се директно поврзани со трансакциските субјекти преку <span style="color: #59a8fb;"><strong>односи еден-на-многу</strong></span>. Тие ги опишуваат поединечните компоненти или димензии кои го дефинираат секој деловен настан, обезбедувајќи суштински контекст.</p>
<h3>Улога во димензионално моделирање</h3>
<ul>
<li><p>Компонентните ентитети стануваат <span style="color: #59a8fb;"><strong>табели со димензии</strong></span> во шеми на ѕвезди.</p></li>
<li><p>Тие го обезбедуваат деловниот контекст за сечење, коцки и филтрирање на податоци за факти.</p></li>
<li><p>Тие одговараат на основните аналитички прашања: <span style="color: #59a8fb;"><strong>кој, што, кога, каде, како и зошто</strong></span> за секоја трансакција.</p></li>
</ul>
<table>
<tr><th><p>Клиент</p></th><th><p>Производ</p></th></tr>
<tr><td style="background: #FFF4E6;"><p>Кој го направил купувањето или учествувал на настанот</p></td><td><p>Што е продадено или за кој предмет станува збор</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Локација</p></td><td><p>Период</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Каде се случила или била обработена трансакцијата</p></td><td><p>Кога трансакцијата се случила навреме</p></td></tr>
</table>
<p><span style="color: #59a8fb;"><strong>Важна забелешка</strong></span>: Времето е критична компонента ентитет бидејќи историската анализа е суштинско барање на складиштата на податоци. Секоја табела со факти треба да вклучува временски димензии за анализа на трендовите.</p>
<h2>🏷️ Класификација субјекти</h2>
<p><span style="color: #59a8fb;"><strong>Класификација субјекти</strong></span> се поврзани со составни ентитети преку синџири на <span style="color: #59a8fb;"><strong>односи еден-на-многу</strong></span>. Тие се функционално зависни од составните ентитети, кои претставуваат хиерархиски структури.</p>
<h3>Цел</h3>
<ul>
<li><p>Претставуваат <span style="color: #59a8fb;"><strong>хиерархии</strong></span> вградени во моделот на податоци.</p></li>
<li><p>Снимајте класификација и групирање структури како што се категории и нивоа.</p></li>
<li><p>Овозможи <span style="color: #59a8fb;"><strong>дупчење и ролна анализа</strong></span> патеки.</p></li>
<li><p>Ако податоците се погодни за паѓачкото мени со ниска кардиналност во корисничкиот интерфејс, тоа е веројатно ентитет на класификација.</p></li>
</ul>
<h3>Улога во димензионално моделирање</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Колапс хиерархии</strong></span>: Ентитетите на класификацијата може да се склопат во составни ентитети кога се креираат табели со димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Анализа за поддршка</strong></span>: Тие поддржуваат хиерархиска анализа, како што се собирање и вежбање на нивоа.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Зачувај го значењето</strong></span>: Тие го поедноставуваат аналитичкиот модел додека го зачувуваат деловното значење и односите.</p></li>
</ul>
<img alt="Примери за ентитети за класификација" src="images/datawarehouses/dw-055.png" style="max-width: 500px; margin-left: 0"/>
<h2>🧐 Решавање на нејаснотии</h2>
<p>Кога еден ентитет се вклопува во повеќе категории, а <span style="color: #59a8fb;"><strong>хиерархија на првенство</strong></span> се користи:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Трансакциски ентитет</strong></span> (највисока предност)</p></li>
<li><p><span style="color: #59a8fb;"><strong>Класификација субјект</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Компонентен ентитет</strong></span> (најниско првенство)</p></li>
</ol>
<p>Оваа хиерархија ја одредува примарната улога на ентитетот во ѕвездената шема.</p>
<img alt="Хиерархија на првенство" src="images/datawarehouses/dw-056.png" style="max-width: 500px; margin-left: 0"/>
<h2>🌲 Хиерархии</h2>
<p><span style="color: #59a8fb;"><strong>Хиерархии</strong></span> се клучни во димензионалното моделирање, формирајќи ја примарна основа за изведување на димензионални модели од ER модели. Повеќето табели со димензии ги вградуваат овие хиерархии. Хиерархија на ER модел е низа од ентитети споени со врски еден-на-многу, порамнети во иста насока.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Родител/Дете</strong></span>: Државата е родител на Регионот; Регионот е дете на државата.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Потомци</strong></span>: Продажен артикл, Продажба, Локација за продажба, Регион се сите потомци на државата.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Предци</strong></span>: Продажба, Локација за продажба, Регион, држава се сите предци на артиклите за продажба.</p></li>
</ul>
<img alt="ЕР дијаграм со хиерархии" src="images/datawarehouses/dw-057.png" style="max-width: 500px; margin-left: 0"/>
<h3>Максимална хиерархија</h3>
<p>Хиерархија е <span style="color: #59a8fb;"><strong>максимално</strong></span> ако не може да се прошири понатаму нагоре или надолу, опфаќајќи го целосниот опсег на деловниот однос.</p>
<h3>Минимален ентитет</h3>
<p>Ентитет е <span style="color: #59a8fb;"><strong>минимална</strong></span> ако се наоѓа на самото дно на максималната хиерархија, без дополнителни врски еден-на-многу кои се насочени подалеку од него (ентитети „лист“).</p>
<h3>Максимален ентитет</h3>
<p>Ентитет е <span style="color: #59a8fb;"><strong>максимално</strong></span> ако е позициониран на врвот на максималната хиерархија, што значи дека нема дополнителни врски многу-на-еден што водат до него (ентитети „корен“).</p>
<h3>Пример за хиерархии на ентитети</h3>
<p>Од примерен модел на податоци, можеме да идентификуваме:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Минимални ентитети</strong></span>: Продажен артикл и продажен надоместок (2 субјекти).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Максимални ентитети</strong></span>: Период, Тип на клиент, држава, Тип на локација, Тип на производ и Вид на надоместок (6 субјекти).</p></li>
</ul>
<img alt="Хиерархии на ентитети ERD" src="images/datawarehouses/dw-058.png" style="max-width: 500px; margin-left: 0"/>
<p>Овие хиерархии дефинираат детални односи и лоза, обезбедувајќи структуриран поглед за анализа.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Хиерархии на производи</strong></span>: Тип на производ <span>$\десно стрелка$</span> Производ <span>$\десно стрелка$</span> Продажба-артикал; Тип на надоместок <span>$\десно стрелка$</span> Продажба-надоместок.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Хиерархии на клиенти</strong></span>: Држава <span>$\десно стрелка$</span> Регионот <span>$\десно стрелка$</span> Клиент <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал); Клиент-тип <span>$\десно стрелка$</span> Клиент <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Хиерархии на локација</strong></span>: Локација-тип <span>$\десно стрелка$</span> Локација <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал); држава <span>$\десно стрелка$</span> Регионот <span>$\десно стрелка$</span> Локација <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Временски хиерархии</strong></span>: Период (датум на продажба) <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал); Период (објавен-датум) <span>$\десно стрелка$</span> Продажба <span>$\десно стрелка$</span> Продажба-надоместок (и Продажба-артикал).</p></li>
</ul>
<h2>🔨 Производство на димензионални модели</h2>
<p>Димензионалното моделирање вработува специјализирани оператори за да ги трансформираат ER моделите во шеми со ѕвезди, оптимизирајќи ги податоците за аналитички прашања.</p>
<h3>Оператор 1: Колапс хиерархија</h3>
<p>Овој основен оператор ги консолидира атрибутите од ентитет на повисоко ниво во ентитет од пониско ниво во хиерархија еден-на-многу.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Процес</strong></span>: Намерен чин на <span style="color: #59a8fb;"><strong>денормализација</strong></span>, воведувајќи вишок за да се создадат порамни, попрофесионални табели со димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Атрибутите на ентитет „Држава“ (Државна ИД, Име на државата) се апсорбираат во ентитетот „Регион“, создавајќи единствена, поширока димензија.</p></li>
</ul>
<img alt="Држава што се распаѓа во регион" src="images/datawarehouses/dw-059.png" style="max-width: 500px; margin-left: 0"/>
<img alt="Состојбата и регионот се распаѓаат во локација" src="images/datawarehouses/dw-060.png" style="max-width: 500px; margin-left: 0"/>
<h3>Оператор 2: Агрегација</h3>
<p>На <span style="color: #59a8fb;"><strong>оператор за агрегација</strong></span> се применува на трансакциски ентитет за да се создаде нов ентитет кој содржи сумирани податоци.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Процес</strong></span>: Вклучува избор на подмножество од <span style="color: #59a8fb;"><strong>нумерички атрибути</strong></span> да се соберат и уште една подмножество на атрибути да се групираат по.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Примена на агрегација на a <code>Sale Item</code> ентитет да се создаде а <code>Product Summary</code> ентитет (на пр., вкупен износ на продажба, просечна количина по нарачка, просечна цена по ставка на дневна основа).</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Агрегација атрибути</strong></span>: Количина, Цена.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Групирање на атрибути</strong></span>: ИД на производот, Датум на продажба.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>важно</strong></span>: Агрегирањето инхерентно вклучува а <span style="color: #59a8fb;"><strong>губење на детални информации</strong></span>. Откако ќе се сумираат податоците, не е можно да се реконструираат поединечни детали.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Последица</strong></span>: Во ETL, една табела со факти обично се чува на најниска грануларност, а потоа се креираат други збирни табели со факти.</p></li>
</ul>
<img alt="Пример за нумеричка агрегација" src="images/datawarehouses/dw-061.png" style="max-width: 500px; margin-left: 0"/>
<hr/>
<h1>📊 Димензионално моделирање: табели со факти</h1>
<p>Табелите со факти се јадрото на димензионалниот модел, складирање на мерливи деловни метрики и поврзување со табели со димензии за контекст. Тие се вообичаено тесни (неколку колони), но огромни во однос на редовите (милијарди +).</p>
<h2>📝 Структура на табела со факти</h2>
<p>Размислете за табела со факти за продажбата именувана <code>f_Sales</code> како пример за добри дизајн практики:</p>
<pre><code class="language-sql">CREATE TABLE f_Sales (
    -- Dimension keys
    OrderDate_Date_FK INT NOT NULL,
    ShipDate_Date_FK INT NOT NULL,
    Product_FK INT NOT NULL,
    Salesperson_FK INT NOT NULL,
    -- Attributes
    SalesOrderNo INT NOT NULL,
    SalesOrderLineNo SMALLINT NOT NULL,
    -- Measures
    Quantity INT NOT NULL,
    -- Audit attributes
    AuditMissing BIT NOT NULL,
    AuditCreatedDate DATE NOT NULL,
    AuditCreatedBy VARCHAR(15) NOT NULL,
    AuditLastModifiedDate DATE NOT NULL,
    AuditLastModifiedBy VARCHAR(15) NOT NULL
);</code></pre>
<h3>Примарен клуч и клучеви за димензии</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Примарен клуч</strong></span>: Табели со факти обично <span style="color: #59a8fb;"><strong>немаат експлицитен примарен клуч</strong></span>. Честопати не служи за корисна цел и непотребно ја зголемува големината на складирањето. Примарниот клуч често се подразбира од множеството клучеви за димензија и атрибути.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Клучеви за димензии</strong></span>: Референци за сурогат клучеви (или атрибути на повисоко ниво) во сродни димензии. Табелата за необични факти нема да вклучува барем еден клуч за димензија на датум.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Димензија на играње улоги</strong></span>: Табелата со факти може да упатува на димензија повеќе пати. На пример, <code>OrderDate_Date_FK</code> и <code>ShipDate_Date_FK</code> и двете се однесуваат на истата физичка димензија на датумот, секој од нив игра посебна улога.</p></li>
</ul>
<h3>Атрибути, мерки и карактеристики на ревизија</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Атрибути</strong></span>: Обезбедете дополнителни информации и поставете ја грануларноста на податоците за фактите, но не се ниту клучеви за димензија, ниту атрибути за димензија, ниту мерки. Примерите вклучуваат броеви на нарачки за продажба или броеви за следење. Еден атрибут може да формира а <span style="color: #59a8fb;"><strong>дегенерирана димензија</strong></span> за анализа.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Мерки</strong></span>: Типично нумерички и вообичаено <span style="color: #59a8fb;"><strong>адитив</strong></span> (може да се сумира и сумира). На <code>Quantity</code> колоната во примерот е мерка.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ревизорски карактеристики</strong></span>: Изборни атрибути кои следат кога и како се креирани или модифицирани записите со факти и може да вклучуваат дијагностички информации од ETL процесите.</p></li>
</ul>
<h2>📏 Концепти за големина и дизајн на табела со факти</h2>
<p>Табелите со факти се разликуваат по големина врз основа на димензионалноста, грануларноста, бројот на мерки и количината на историја. Тие се типично <span style="color: #59a8fb;"><strong>тесен</strong></span> (помалку колони) но <span style="color: #59a8fb;"><strong>голема или огромна</strong></span> во однос на редови (што надминува милијарди).</p>
<h3>Три типа на табели со факти</h3>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Табели со факти за трансакции</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Периодични табели со факти</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Акумулира табели со факти за слики</strong></span></p></li>
</ol>
<h3>Видови мерки</h3>
<p>Мерките се типично нумерички и најчесто адитивни. Сепак, некои мерки се <span style="color: #59a8fb;"><strong>полу-адитив</strong></span> или <span style="color: #59a8fb;"><strong>не-адитив</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Адитивни мерки</strong></span>: Може да се сумира во која било димензија (на пр., количина на нарачка, приход од продажба во една валута).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Полуадитивни мерки</strong></span>: Може да се сумира само преку одредени димензии.</p><ul>
<li><p>Секоја мерка во табела со факти за периодични слики не може да се сумира низ други временски периоди.</p></li>
<li><p>Мерката за билансот на акции во табела со факти за залихи не може да се сумира кај други производи.</p></li>
<li><p>Приходите од продажба со клуч за димензија на валута не може да се сумираат низ валути.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Мерки без додавање</strong></span>: Не може да се сумира низ која било димензија (на пр., отчитување на температурата, стапки, соодноси). Тие сè уште може да се соберат со користење на броење, различно броење, минимално, максимум или просек.</p></li>
</ul>
<h2>🛒 Табели со факти за трансакции</h2>
<p>А <span style="color: #59a8fb;"><strong>табела со факти за трансакцијата</strong></span> складира деловни настани или трансакции. Секој ред ги складира фактите во однос на копчињата и мерките за димензија, како и опционално други атрибути. Сите податоци се целосно познати кога се вметнуваат и никогаш не се менуваат (освен за корекција на грешки).</p>
<ul>
<li><p>Обично складирајте факти на <span style="color: #59a8fb;"><strong>најниско можно ниво на грануларност</strong></span>.</p></li>
<li><p>Содржи мерки кои се <span style="color: #59a8fb;"><strong>адитив</strong></span> низ сите димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Табела со факти за продажба која ја складира секоја линија за нарачки за продажба.</p></li>
</ul>
<img alt="Пример за табела со факти за трансакции" src="images/datawarehouses/dw-062.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><code>fact_sale</code> ја има грануларноста на најгрануларна табела во изворната база на податоци (на пр. <code>sales_order_details</code>, <code>sales_items</code>).</p></li>
</ul>
<h2>📸 Периодични табели со факти</h2>
<p>А <span style="color: #59a8fb;"><strong>периодична табела со факти</strong></span> складира мерења во однапред дефинирано време или специфични интервали. Обезбедува резиме на клучните метрики со текот на времето и е корисен за анализа на трендовите. Мерките се секогаш <span style="color: #59a8fb;"><strong>полу-адитив</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Пример</strong></span>: Табела со факти за залихи која секојдневно се вчитува со билансот на залихите на крајот на денот на секој производ.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Случај за употреба</strong></span>: Се користи при снимање на големи количини на трансакции е скапо и не поддржува корисни аналитички барања, фокусирајќи се на трендовите наместо на индивидуалните трансакции.</p></li>
</ul>
<img alt="Пример за табела со факти за периодична слика" src="images/datawarehouses/dw-063.png" style="max-width: 500px; margin-left: 0"/>
<h2>🔄 Акумулира табели со факти за слики</h2>
<p>Ан <span style="color: #59a8fb;"><strong>акумулирачка табела со факти за слика</strong></span> складира мерења кои се акумулираат во добро дефиниран период или работен тек. Често ја евидентира состојбата на деловниот процес во различни фази или пресвртници, за кои може да бидат потребни денови, недели или месеци за да се завршат.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Почетен настан</strong></span>: Редот со факти се вчитува веднаш по првиот настан во процесот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ажурирања за пресвртница</strong></span>: Редот се ажурира во предвидлива секвенца секогаш кога ќе се случи настан од пресвртница.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Завршување на процесот</strong></span>: Ажурирањата продолжуваат додека не заврши процесот.</p></li>
</ul>
<img alt="Процес на акумулирање на табела со факти за слики" src="images/datawarehouses/dw-064.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p>Имаат <span style="color: #59a8fb;"><strong>повеќекратни копчиња за димензија на датум</strong></span>, секој од нив претставува настан од пресвртница.</p></li>
<li><p>Некои копчиња за димензии може да снимаат <code>N/A</code> состојба додека не се постигне одредена пресвртница.</p></li>
<li><p>Мерките обично се снимаат <span style="color: #59a8fb;"><strong>времетраење</strong></span> помеѓу пресвртниците, обезбедувајќи вреден увид во деловните работни текови.</p></li>
</ul>
<img alt="Акумулирачка табела со факти ERD" src="images/datawarehouses/dw-065.png" style="max-width: 500px; margin-left: 0"/>
<h2>👻 Табели со факти без факти</h2>
<p>А <span style="color: #59a8fb;"><strong>табела со факти без факти</strong></span> не содржи никакви колони со мерки. Обично снима настани или појави (на пр. студенти кои посетуваат настава). Од аналитичка перспектива, мерењето може да се постигне со броење на редови со факти.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цел</strong></span>: Снима појава на настан или состојба без нумерички мерки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Примери</strong></span>: "клиентот го видел производот во продавницата на датум", "клиентот кој ги исполнува условите за промоција во продавницата на датум", "клиент-производ-продавницата имала најмалку една допирна точка".</p></li>
</ul>
