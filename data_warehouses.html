| brand          | varchar(100) |                                     |              | is_active       | boolean      |</code></pre>
<h2>🌌 Fact Constellation Schema &amp; Fact Galaxy Schema</h2>
<h3>Fact Constellation Schema</h3>
<p>An aggregate fact table represents a rollup of a base fact table to a lower dimensionality and/or higher granularity. Its purpose is to accelerate query performance for commonly queried dimensions.</p>
<ul>
<li><p>Consists of a set of star schemas with <span style="color: #59a8fb;"><strong>hierarchically linked fact tables</strong></span>.</p></li>
<li><p>Links between fact tables provide the ability to <span style="color: #59a8fb;"><strong>drill down</strong></span> between levels of detail (e.g., from Sale to Sale Item).</p></li>
</ul>
<img alt="Fact Constellation Schema Example" src="images/datawarehouses/dw-067.png" style="max-width: 500px; margin-left: 0"/>
<h3>Fact Galaxy Schema</h3>
<p>More generally, a set of star schemas or constellations can be combined to form a <span style="color: #59a8fb;"><strong>galaxy</strong></span>.</p>
<ul>
<li><p>A galaxy is a collection of star schemas with <span style="color: #59a8fb;"><strong>shared dimensions</strong></span>.</p></li>
<li><p>Unlike a constellation schema, the fact tables in a galaxy <span style="color: #59a8fb;"><strong>do not need to be directly related</strong></span>.</p></li>
</ul>
<img alt="Fact Galaxy Schema Example" src="images/datawarehouses/dw-068.png" style="max-width: 500px; margin-left: 0"/>
<hr/>
<h1>📥 Dimensional Modeling: Loading Dimensions and Facts</h1>
<p>Loading a dimensional model involves periodically running an <span style="color: #59a8fb;"><strong>Extract, Transform, and Load (ETL) process</strong></span>. This process orchestrates the staging of source data, synchronization of dimension data, insertion of rows into fact tables, and recording of auditing data and errors.</p>
<img alt="ETL Process for Dimensional Model" src="images/datawarehouses/dw-069.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Pipelines</strong></span>: Build workflows to orchestrate the ETL process, executing SQL scripts, stored procedures, etc.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Dataflows</strong></span>: Develop low-code logic to ingest data from hundreds of sources using the Power Query experience.</p></li>
<li><p><span style="color: #59a8fb;"><strong>ETL Development</strong></span>: Can be complex and challenging, often consuming 60-80% of a data warehouse development effort.</p></li>
</ul>
<h2>⚙️ Orchestration</h2>
<p>The general workflow of an ETL process follows a structured sequence:</p>
<table>
<tr><th><p>01</p></th><th><p>02</p></th></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Load Staging Tables</strong></span></p></td><td><p><span style="color: #59a8fb;"><strong>Process Dimension Tables</strong></span></p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Optionally extract and stage source data for processing</p></td><td><p>Synchronize dimension data and handle historical changes</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>03</p></td><td><p>04</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Process Fact Tables</strong></span></p></td><td><p><span style="color: #59a8fb;"><strong>Post-Processing Tasks</strong></span></p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Load fact data with proper dimension key lookups</p></td><td><p>Trigger refreshes and send notifications</p></td></tr>
</table>
<img alt="ETL Process Workflow" src="images/datawarehouses/dw-070.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Dimension tables</strong></span> should be processed first, especially when there are dependencies (e.g., an outrigger dimension like geography must be processed before customer and vendor dimensions).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Fact tables</strong></span> can be processed once all dimension tables are complete.</p></li>
<li><p>Post-processing includes triggering refreshes of semantic models and sending notifications about the ETL outcome.</p></li>
</ul>
<h2>staging data 🚧</h2>
<p>Staging data is an intermediary step in the ETL process, where raw source data is temporarily stored before transformation and loading into the data warehouse.</p>
<img alt="Benefits of Staging Data" src="images/datawarehouses/dw-071.png" style="max-width: 500px; margin-left: 0"/>
<h3>Data Virtualization Alternatives</h3>
<p>Consider data virtualization to reduce data movement and improve efficiency:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Mirroring</strong></span>: A low-cost, low-latency solution that creates a replica of your data in OneLake.</p></li>
<li><p><span style="color: #59a8fb;"><strong>PolyBase in SQL Server</strong></span>: Allows T-SQL queries to join data from external sources to relational tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>OneLake Shortcuts</strong></span>: Point to other storage locations containing source data, usable as tables in T-SQL queries.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Azure SQL Managed Instance</strong></span>: Execute T-SQL queries on files in Azure Data Lake Storage Gen2 or Azure Blob Storage and combine with locally stored relational data.</p></li>
</ul>
<h2>🔄 Transform Data</h2>
<p>The structure of source data often differs from the destination structures of dimensional model tables. The ETL process must reshape and transform source data to ensure <span style="color: #59a8fb;"><strong>quality and consistency</strong></span>.</p>
<ul>
<li><p>"Garbage in, garbage out" applies: avoid loading low-quality data into dimensional model tables.</p></li>
</ul>
<h3>Key Transformation Activities</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Combine Data</strong></span>: Integrate data from different sources based on matching keys or append data sharing a common structure (e.g., merging product data using SKU, unioning sales data).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Detect Historical Change</strong></span>: Detect and appropriately store changes in dimension tables to maintain historical accuracy (SCD types).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Convert Data Types</strong></span>: Convert data types to align with the dimensional model tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Aggregate Data</strong></span>: Reduce fact table dimensionality or raise the granularity of facts (e.g., grouping sales by dimension keys without storing sales order numbers).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Calculations</strong></span>: Produce values for dimensional model tables (e.g., concatenate first and last names for full name, calculate gross sales revenue).</p></li>
</ul>
<h2>⬆️ Load Data</h2>
<p>Various data ingestion options are available for loading tables in a Fabric Warehouse, each suited for different scenarios.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong><code>COPY INTO</code></strong></span><span style="color: #59a8fb;"><strong> (T-SQL)</strong></span>: Useful for Parquet or CSV files stored in external Azure storage accounts (ADLS Gen2, Azure Blob Storage).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Dataflows</strong></span>: Provide a code-free experience to transform and clean data with an intuitive interface.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Pipelines</strong></span>: Can include activities that run T-SQL statements, perform lookups, or copy data from a source to a destination.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Cross-Warehouse Ingestion</strong></span>: When data is stored in the same workspace, allows joining different warehouse or lakehouse tables. Supports <code>INSERT...SELECT</code>, <code>SELECT INTO</code>, and <code>CREATE TABLE AS SELECT</code> (CTAS) commands for efficient set-based operations.</p></li>
</ul>
<h2>📝 Logging</h2>
<p>ETL processes require dedicated monitoring and maintenance. Logging the results of the ETL process to non-dimensional model tables in your warehouse is recommended.</p>
<h3>ETL Process Logging</h3>
<ul>
<li><p>Unique ID for each execution.</p></li>
<li><p>Start time and end time.</p></li>
<li><p>Status (success or failure).</p></li>
<li><p>Any errors encountered.</p></li>
</ul>
<h3>Table-Level Logging</h3>
<ul>
<li><p>Start and end times.</p></li>
<li><p>Status indicators.</p></li>
<li><p>Rows inserted, updated, deleted.</p></li>
<li><p>Final table row count.</p></li>
<li><p>Error details.</p></li>
</ul>
<p>A semantic model dedicated to monitoring ETL processes can help identify bottlenecks and predict future data warehouse size.</p>
<h3>Operation Logging</h3>
<ul>
<li><p>Start and end times of semantic model refresh operations.</p></li>
<li><p>Performance metrics.</p></li>
<li><p>Resource utilization.</p></li>
</ul>
<h2>🌳 Process Dimension Tables</h2>
<p>Processing a dimension table involves synchronizing the data warehouse data with source systems. Source data is transformed, prepared, and then matched with existing dimension table data by joining on <span style="color: #59a8fb;"><strong>business keys</strong></span>.</p>
<img alt="Processing a Dimension Table" src="images/datawarehouses/dw-072.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>New Products</strong></span>: Rows are inserted into the dimension table.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Modified Products</strong></span>: Existing rows are either updated (SCD type 1) or a new version is inserted and the existing one expired (SCD type 2).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Historical Tracking</strong></span>: SCD type 2 expires current versions and inserts new versions.</p></li>
</ul>
<h2>📊 Process Fact Tables</h2>
<p>Processing a fact table involves synchronizing data with source system facts. Source data is transformed, and for each dimension key, a lookup determines the surrogate key value to store in the fact row.</p>
<img alt="Processing a Fact Table" src="images/datawarehouses/dw-073.png" style="max-width: 500px; margin-left: 0"/>
<h3>Dimension Key Lookups</h3>
<ul>
<li><p>When a dimension supports SCD type 2, the surrogate key for the <span style="color: #59a8fb;"><strong>current version</strong></span> of the dimension member should be retrieved.</p></li>
<li><p>For date and time dimensions, the surrogate key can often be computed (e.g., YYYYMMDD or HHMM format).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Integrity Check</strong></span>: Since many DW systems don't enforce foreign keys, the ETL process must check for integrity when loading fact tables.</p></li>
</ul>
<h3>Handling Lookup Failures</h3>
<ul>
<li><p>If a dimension key lookup fails (indicating a source system integrity issue), the fact row must still be inserted with a valid dimension key.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Approach 1</strong></span>: Store a special dimension member like <code>Unknown</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Approach 2</strong></span>: If the natural key is valid, insert a new dimension member and store its surrogate key.</p></li>
</ul>
<h3>Incremental vs. Full Reload</h3>
<ul>
<li><p>Whenever possible, a fact table should be loaded <span style="color: #59a8fb;"><strong>incrementally</strong></span> (new facts detected and inserted). This is more scalable and reduces workload.</p></li>
<li><p>Truncating and reloading a large fact table should be a <span style="color: #59a8fb;"><strong>last resort</strong></span> due to cost, resources, and complexity with SCD type 2 dimensions.</p></li>
</ul>
<h3>Detecting New Facts</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Source System Identifiers/Timestamps</strong></span>: Rely on these to efficiently detect new facts (e.g., storing the latest sales order number as a high watermark).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Change Data Capture (CDC)</strong></span>: SQL Server and Azure SQL Managed Instance offer CDC to track row changes.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Create Date Columns</strong></span>: Can reliably detect new orders.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Database Triggers</strong></span>: Add triggers to relational tables that store keys of inserted, updated, or deleted records for efficient change detection.</p></li>
</ul>
<h3>Inferred Dimension Members</h3>
<p>When a fact load process inserts a new dimension member, it's known as an <span style="color: #59a8fb;"><strong>inferred member</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Initial Creation</strong></span>: Only the natural key is known; the fact load process creates a new dimension member with <code>Unknown</code> attribute values.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Late Arriving Details</strong></span>: When details arrive later, the dimension load process updates the dimension row.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Flag as Inferred</strong></span>: Set an audit attribute like <code>IsInferredMember</code> to <code>TRUE</code>.</p></li>
</ul>
<h2>✏️ Fact Updates or Deletions</h2>
<p>You might be required to update or delete fact data (e.g., canceled sales orders, changed order quantities).</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Soft Deletes Strategy</strong></span>: For canceled orders, change the sales order status (e.g., from <code>Open</code> to <code>Canceled</code>) rather than deleting the row. This preserves history.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Identification Attributes</strong></span>: Include attributes like sales order number and line number in the fact table to help identify rows for modification. Index these columns for efficient operations.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Quantity Updates</strong></span>: For quantity changes, an update of the fact row quantity measure is necessary.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Periodic Processing</strong></span>: If fact data was inserted using an <code>Unknown</code> dimension member, run a periodic process to retrieve current source data and update dimension keys to valid values.</p></li>
</ul>
<p>All reporting queries and Power BI semantic models should filter out soft-deleted records to ensure accurate reporting.</p>
<h2>➡️ Pipeline Lineage</h2>
<h3>Transformations, Loading Dimensions, Facts, and Derived Facts</h3>
<img alt="Data Pipeline Lineage" src="images/datawarehouses/dw-074.png" style="max-width: 500px; margin-left: 0"/>
<p>This diagram illustrates the flow of data through a pipeline, from raw (bronze) to refined (silver) tables, then into dimension (<code>dim</code>) tables, and finally into fact (<code>fact</code>) tables for analysis. This process transforms and loads data through different stages, preparing it for reporting and analytics.</p>

<h1>📊 Архитектури на податочна платформа и димензионално моделирање</h1>
<p>Архитектурите на податочните платформи се основни за управување и анализа на податоците на претпријатието. Едно <span style="color: #59a8fb;"><strong>складиште на податоци (DW)</strong></span> служи како централно складиште, оптимизирано за аналитички прашања, во остар контраст со оперативните бази на податоци дизајнирани за трансакциска обработка. Разбирањето на интеракцијата помеѓу различните архитектури на податоци, обрасците за обработка како OLTP и OLAP и современите концепти како што се езерата со податоци и езерските куќи е од клучно значење за ефективно инженерство на податоци.</p>
<hr/>
<h2>🏛️ Основи за складиште на податоци</h2>
<p><span style="color: #59a8fb;"><strong>Складиштето за податоци</strong></span> е основна компонента на деловната интелигенција, обезбедувајќи структурирано складиште за историски податоци што може да се испита. Се однесува на ограничувањата на директното барање оперативни бази на податоци, кои обично се нормализираат за трансакциска ефикасност и на тој начин работат слабо на сложени аналитички прашања.</p>
<img alt="Архитектура на складиште на податоци" src="images/datawarehouses/dw-001.png" style="max-width: 500px; margin-left: 0"/>
<h3>🚨 Предизвик без складиште на податоци</h3>
<p>Директно барање <span style="color: #59a8fb;"><strong>оперативни бази на податоци</strong></span> (OLTP системи) за аналитички цели претставува неколку прашања:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Бавна изведба на барање</strong></span>: Нормализираните структури на податоци (3NF) не се оптимизирани за големи, сложени аналитички прашања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Оптоварување на системот</strong></span>: Аналитичките прашања може прекумерно да ги оптоварат оперативните системи, што влијае на трансакциите во реално време.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Комплексни спојувања</strong></span>: Често се потребни обемни спојувања за да се добијат значајни аналитички сознанија од нормализирани податоци.</p></li>
</ul>
<p>Складиштето на податоци ги надминува овие предизвици со складирање на податоци во формати оптимизирани за <span style="color: #59a8fb;"><strong>читање, собирање и барање големи количини историски податоци</strong></span>.</p>
<h3>🔄 Шаблони за пристап OLTP наспроти OLAP</h3>
<p><span style="color: #59a8fb;"><strong>Обработка на онлајн трансакции (OLTP)</strong></span> и <span style="color: #59a8fb;"><strong>Онлајн аналитичка обработка (OLAP)</strong></span> претставуваат фундаментално различни обрасци за пристап до податоци, што бара посебни архитектонски пристапи.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>OLTP системи</strong></span>:</p><ul>
<li><p>Рачка <span style="color: #59a8fb;"><strong>чести, мали трансакции</strong></span>.</p></li>
<li><p>Оптимизиран за <span style="color: #59a8fb;"><strong>поединечни трансакции</strong></span> и операции со податоци на ниво на ред.</p></li>
<li><p>Фокусирајте се на <span style="color: #59a8fb;"><strong>модификации на податоци во реално време</strong></span>.</p></li>
<li><p>Примери: внесување нарачки, банкарски трансакции.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>OLAP системи</strong></span>:</p><ul>
<li><p>Процес <span style="color: #59a8fb;"><strong>сложени прашања</strong></span> низ огромни збирки на податоци.</p></li>
<li><p>Организирајте ги податоците во <span style="color: #59a8fb;"><strong>повеќедимензионални коцки</strong></span> (време, географија, категории на производи).</p></li>
<li><p>Овозможете интерактивни операции како <span style="color: #59a8fb;"><strong>пресечете, исечете на коцки, издупчете и свртете го</strong></span>.</p></li>
<li><p>Обезбедете <span style="color: #59a8fb;"><strong>брза агрегација</strong></span> и однапред пресметани резимеа за брзи одговори.</p></li>
<li><p>Поддршка <span style="color: #59a8fb;"><strong>сложени аналитички функции</strong></span>.</p></li>
<li><p>Магацините на податоци често користат <span style="color: #59a8fb;"><strong>димензионално моделирање</strong></span>, организирање на податоци во <span style="color: #59a8fb;"><strong>табели со факти</strong></span> (мерења) и <span style="color: #59a8fb;"><strong>табели со димензии</strong></span> (контекст) за интуитивна анализа.</p></li>
</ul></li>
</ul>
<h3>📊 Кога OLTP системите паѓаат: потребата од OLAP</h3>
<p>Оперативните бази на податоци, иако се одлични за трансакции, се борат со длабоки аналитички прашања кои бараат собирање огромни историски збирки на податоци низ повеќе димензии. Ова е местото каде <span style="color: #59a8fb;"><strong>складишта на податоци</strong></span> и <span style="color: #59a8fb;"><strong>OLAP системи</strong></span> се истакнуваат.</p>
<p>Примери на сложени аналитички прашања со кои OLTP системите се борат:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Комплексни трендови на продажба</strong></span>: Анализирање на растот на продажбата од година во година по линија на производи, регион и сегмент на клиенти за да се идентификуваат сезонските модели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Предвидувачки инвентар</strong></span>: Прогнозирање на оптимални нивоа на залихи со комбинирање на историските продажби, времето на испорака на добавувачите и промотивните влијанија.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Метрика на вредноста на клиентите</strong></span>: Пресметување на вкупниот приход што се очекува да го генерира клиентот во текот на нивниот однос со бизнисот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Финансиски перформанси</strong></span>: Споредување на буџетираните расходи и приходи со реалните бројки низ одделите за анализа на варијанса.</p></li>
</ul>
<h3>📝 Дефинирање на складиште на податоци</h3>
<p>Истакнати фигури во управувањето со податоци дадоа основни дефиниции:</p>
<img alt="Дефиниции за складиште на податоци" src="images/datawarehouses/dw-002.png" style="max-width: 500px; margin-left: 0"/>
<p>Овие дефиниции нагласуваат дека складиштето на податоци е структурирани податоци дизајнирани да поддржуваат <span style="color: #59a8fb;"><strong>одлучување</strong></span> и <span style="color: #59a8fb;"><strong>деловна интелигенција</strong></span>.</p>
<h3>🏷️ Клучна терминологија за традиционално складирање податоци</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Магацин на податоци</strong></span>: А <span style="color: #59a8fb;"><strong>централизирано складиште</strong></span> за интегрирани, историски податоци, дизајнирани за аналитичко известување и деловна интелигенција.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Нормализиран модел</strong></span>: Пристап за дизајнирање на базата на податоци што го намалува вишокот на податоци и го подобрува интегритетот, првенствено за <span style="color: #59a8fb;"><strong>трансакциски системи</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>БИ (Бизнис интелигенција)</strong></span>: Алатки и процеси кои ги трансформираат необработените податоци во <span style="color: #59a8fb;"><strong>значајни согледувања</strong></span> за информирано деловно одлучување.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Податоци Март</strong></span>: А <span style="color: #59a8fb;"><strong>фокусирано подмножество</strong></span> на складиште на податоци, кои ги опслужуваат аналитичките потреби на одреден оддел или деловна функција.</p></li>
<li><p><span style="color: #59a8fb;"><strong>OLAP (Онлајн аналитичка обработка)</strong></span>: Технологија која овозможува интерактивна, <span style="color: #59a8fb;"><strong>мултидимензионална анализа</strong></span> на големи количини на податоци за стратешки согледувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Модел за рударство податоци</strong></span>: Алгоритми и техники кои се користат за откривање обрасци, трендови и аномалии од големи збирки податоци за <span style="color: #59a8fb;"><strong>предвидувачка анализа</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Димензионален модел, Ѕвездена шема</strong></span>: Модел на логички податоци (факти + димензии) оптимизирање на складишта на податоци за <span style="color: #59a8fb;"><strong>брзо, интуитивно барање</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>ETL (екстракција, трансформација, оптоварување)</strong></span>: Основен процес на преместување податоци од изворни системи, нивно чистење/реструктуирање и вчитување во складиште на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ад-хок барање</strong></span>: Прашање формулирано на лето за да се одговори a <span style="color: #59a8fb;"><strong>специфично, спонтано деловно прашање</strong></span>.</p></li>
</ul>
<hr/>
<h2>🚀 Развој на пејзаж на податоци: клучни концепти</h2>
<p>Како што растат обемот и сортите на податоци, се појавија нови архитектонски парадигми за да ги задоволат современите аналитички барања.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Архитектура на Лејкхаус</strong></span>: А <span style="color: #59a8fb;"><strong>хибридна архитектура на податоци</strong></span> комбинирајќи ја флексибилноста и економичноста на <span style="color: #59a8fb;"><strong>податоци езера</strong></span> со робусните способности за управување со податоци и трансакциски ACID на <span style="color: #59a8fb;"><strong>складишта на податоци</strong></span>. Поддржува и структурирани и неструктурирани податоци за разновидна аналитика и машинско учење.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Податочна мрежа</strong></span>: А <span style="color: #59a8fb;"><strong>децентрализирана архитектура на податоци</strong></span> кој ги третира податоците како производ, организиран по деловни домени. Секој домен управува со сопствената инфраструктура на податоци, производи и стандарди, поттикнувајќи <span style="color: #59a8fb;"><strong>агилност, приспособливост и сопственост на податоци</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Езерото на податоци</strong></span>: А <span style="color: #59a8fb;"><strong>централизирано складиште</strong></span> за огромни количини на необработени, необработени податоци во нивниот мајчин формат. Тоа е <span style="color: #59a8fb;"><strong>шема-агностичка</strong></span>, идеален за аналитика на големи податоци и машинско учење.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ткаенина за податоци</strong></span>: Архитектура која обезбедува а <span style="color: #59a8fb;"><strong>унифициран, интелигентен поглед</strong></span> на податоците на организацијата низ различни средини (во простории, облак, хибридни). Интегрира алатки за управување со податоци и користи AI/ML за <span style="color: #59a8fb;"><strong>автоматско откривање на податоци, управување и потрошувачка</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Стриминг на податоци</strong></span>: Генерирани податоци <span style="color: #59a8fb;"><strong>континуирано</strong></span> од бројни извори (IoT, веб-кликови, финансиски трансакции), кои бараат <span style="color: #59a8fb;"><strong>непосредна обработка</strong></span> за инстант увид.</p></li>
</ul>
<hr/>
<h2>⚙️ Процесот на инженерство на податоци</h2>
<p>Процесот на инженеринг на податоци вклучува низа чекори за преместување, трансформирање и подготовка на податоците за анализа.</p>
<img alt="Процес за инженерство на податоци" src="images/datawarehouses/dw-003.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Проголтување податоци</strong></span>: Стекнување необработени податоци од различни извори.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Трансформација на податоци</strong></span>: Чистење, реструктуирање и збогатување на податоците.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сервисирање на податоци</strong></span>: Ставање на обработените податоци достапни за анализа или апликации.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Оркестрација на проток на податоци</strong></span>: Управување со автоматизираните работни текови.</p></li>
</ul>
<p>Дополнителни клучни концепти во инженерството на податоци:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Миграција на податоци</strong></span>: Преместување податоци помеѓу системи или околини, на пр., од просториите во облак.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Интеграција на податоци</strong></span>: Консолидирање на информации од различни системи и IoT уреди во унифицирани текови на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Расправија на податоци</strong></span>: Конвертирање на сурови, неструктурирани податоци во <span style="color: #59a8fb;"><strong>чисти, употребливи формати</strong></span> за аналитика и машинско учење.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Операции со бази на податоци</strong></span>: копирање табели, одржување на синхронизација и поддршка за резервна копија/обновување од катастрофи.</p></li>
</ul>
<h3>🏗️ Архитектура на податоци - слоеви</h3>
<p>Современите архитектури на податоци, како <span style="color: #59a8fb;"><strong>Лејкхаус</strong></span>, често се слоевити за да управуваат со зрелоста и обработката на податоците.</p>
<img alt="Архитектура за складирање на езерска куќа" src="images/datawarehouses/dw-004.png" style="max-width: 500px; margin-left: 0"/>
<p>Вообичаените слоеви вклучуваат:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Слој на извори на податоци</strong></span>: Повеќе извори на податоци (OLTP, ERP, CRM, IoT, веб, социјални медиуми) кои се хранат во архитектурата.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Слој за голтање</strong></span>: Стриминг во реално време (Kinesis, Event Hubs) и процеси на сериско внесување.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Слој за складирање</strong></span>: Складирање необработени податоци (Data Lake - S3, ADLS) и структурирано складирање (Data Warehouse - Redshift, Snowflake). Различни зони (Слетување, Суровини, Доверливи, Курирани) за зрелост на податоците.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Слој за обработка</strong></span>: Трансформација на податоци, чистење, цевководи ETL/ELT (Spark, Databricks), проверки на квалитетот, агрегација и збогатување.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Потрошувачки слој</strong></span>: BI алатки, API, Машинско учење, извештаи и наука за податоци.</p></li>
</ul>
<h3>🏛️ Архитектура на складишта на податоци со две нивоа</h3>
<p>Вообичаена архитектонска шема за складишта на податоци вклучува повеќе нивоа за да се одделат грижите и да се оптимизираат перформансите.</p>
<img alt="Двостепена архитектура на складиште на податоци" src="images/datawarehouses/dw-005.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Слој на изворни системи</strong></span>: Оперативни и надворешни извори на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Станирање на податоци/Слој на ETL</strong></span>:</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Екстракт, трансформација, оптоварување</strong></span> процеси.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Чистење на податоците</strong></span> и валидација.</p></li>
<li><p>Примена на <span style="color: #59a8fb;"><strong>деловни правила</strong></span>.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Слој на складиште на податоци на претпријатијата (EDW)</strong></span>:</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Централизирано складиште</strong></span> за интегрирани, историски податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Единствен извор на вистината</strong></span> за организацијата.</p></li>
<li><p>Вклучува <span style="color: #59a8fb;"><strong>метаподатоци</strong></span> за ETL процесите и каталогот на податоци.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Слој на Data Marts</strong></span>:</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Специфично за одделот</strong></span> или субјектно-ориентирани подмножества.</p></li>
<li><p>Оптимизиран за специфични деловни функции (продажба, финансии).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Денормализиран</strong></span> за извршување на барањето.</p></li>
<li><p>Произлезено од централната EDW.</p></li>
</ul></li>
</ul>
<h3>🌐 Целосен екосистем за инженерство на податоци: Технолошка перспектива</h3>
<p>Современиот екосистем за инженерство на податоци интегрира различни компоненти за да создаде унифицирана, скалабилна архитектура.</p>
<img alt="Комплетен екосистем за инженерство на податоци" src="images/datawarehouses/dw-006.png" style="max-width: 500px; margin-left: 0"/>
<p>Овој екосистем вклучува:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Извори</strong></span>: OLTP бази на податоци, ERP, оперативни апликации, собирачи на настани, дневници, API, складирање датотеки/објекти.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Голтање и транспорт</strong></span>: Репликација на податоци (Fivetran, Stitch), менаџери на работни текови (Airflow), пренос на настани (Kafka, Kinesis), Reverse ETL.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Складирање</strong></span>: Lakehouse, Data Lake (Delta, Iceberg, Hudi, S3), Data Warehouse (Snowflake, BigQuery, Redshift).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Барање и обработка</strong></span>: Spark платформи (Databricks, EMR), SQL пребарувачи (Presto, Trino), DS/ML платформи, бази на податоци за аналитика во реално време (Druid, ClickHouse), обработка на стримови.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Трансформација</strong></span>: Метрички слој (LookML, dbt), моделирање податоци, менаџери на работниот тек.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Анализа и излез</strong></span>: Контролни табли (Looker, Tableau), вградена аналитика, зголемена аналитика, работни простори за податоци, алатки за DS/ML, приспособени апликации.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Вкрстени грижи</strong></span>: Откривање на податоци (Amundsen, DataHub), управување со податоци (Collibra), набљудување на податоци (Монте Карло), права и безбедност (Privacera, Immuta).</p></li>
</ul>
<hr/>
<h2>ETL наспроти ELT Pipelines 🔄</h2>
<p>Разбирање на разликата помеѓу <span style="color: #59a8fb;"><strong>ETL (Екстракт, трансформација, оптоварување)</strong></span> и <span style="color: #59a8fb;"><strong>ELT (Екстракт, оптоварување, трансформација)</strong></span> е од клучно значење за дизајнирање модерни цевководи за податоци.</p>
<h3>📦 ETL Pipeline Architecture (Inmon &amp; Kimball)</h3>
<p><span style="color: #59a8fb;"><strong>ETL</strong></span> е традиционалниот пристап каде што се случува трансформација на податоците <em>пред</em> вчитување во целниот систем. Ова обезбедува квалитет и конзистентност на податоците од самиот почеток.</p>
<img alt="ETL гасоводот" src="images/datawarehouses/dw-007.png" style="max-width: 500px; margin-left: 0"/>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Екстракт</strong></span>: Враќање необработени податоци од повеќе извори (бази на податоци, API, рамни датотеки, платформи за стриминг) во неговиот оригинален формат.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Трансформирајте</strong></span>: Стандардизирање и чистење на податоците за да се исполнат барањата за специфични формати. Ова вклучува примена на деловни правила, проверки на квалитетот на податоците и форматирање, значително подобрување <span style="color: #59a8fb;"><strong>откриеност на податоците</strong></span> и употребливост.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Вчитај</strong></span>: Зачувување на трансформираните податоци до нивната крајна дестинација, обично a <span style="color: #59a8fb;"><strong>складиште за податоци</strong></span>, подготвен за итна анализа и известување.</p></li>
</ol>
<h3>☁️ ELT Pipeline Architecture (Lakehouse)</h3>
<p><span style="color: #59a8fb;"><strong>ELT</strong></span> ја менува традиционалната ETL секвенца со вчитување необработени податоци прво и трансформирање подоцна. Овој модерен пристап ја користи процесорската моќ на складиштата за податоци во облакот и обезбедува поголема флексибилност.</p>
<img alt="ELT гасовод" src="images/datawarehouses/dw-008.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Различен редослед за обработка</strong></span>: Екстракт, Вчитај, Трансформирај. Податоците се внесуваат во него <span style="color: #59a8fb;"><strong>сурова форма</strong></span> и се трансформира само кога е потребно за конкретни случаи на употреба.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Максимално внесување податоци</strong></span>: ELT цевководите се одлични во снимањето што е можно повеќе податоци однапред, овозможувајќи подоцна да се донесат одлуки за трансформација врз основа на <span style="color: #59a8fb;"><strong>новите деловни барања</strong></span> и аналитички потреби.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Флексибилност на шемата</strong></span>: Архитектурата ELT не бара однапред одлуки за типови на податоци, структури и формати. Ова <span style="color: #59a8fb;"><strong>шема-на-читање</strong></span> пристапот обезбедува максимална агилност за истражување и анализа на податоците.</p></li>
</ul>
<hr/>
<h2>🎯 Data Marts: Фокусирана аналитика</h2>
<p><span style="color: #59a8fb;"><strong>Податоците маршираат</strong></span> се помали, фокусирани складишта на податоци дизајнирани да ги опслужуваат специфичните аналитички потреби на одредена деловна единица, оддел или предметна област.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Одделенски складишта на податоци</strong></span>: Тие обезбедуваат побрзи перформанси на барањето и поедноставен пристап за крајните корисници со тоа што го содржат само <span style="color: #59a8fb;"><strong>релевантно подмножество</strong></span> на податоци за претпријатието.</p></li>
</ul>
<img alt="Инфраструктура на податоци со Data Marts" src="images/datawarehouses/dw-009.png" style="max-width: 500px; margin-left: 0"/>
<h3>⬆️ Пристап од дното нагоре (Кимбол)</h3>
<p>Може да се комбинираат повеќе специјализирани податоци за да се создаде сеопфатен <span style="color: #59a8fb;"><strong>складиште за податоци на претпријатието</strong></span>. Овој пристап прво го нагласува градењето за специфични деловни процеси.</p>
<h3>⬇️ Пристап од горе-надолу (Инмон)</h3>
<p>Централното складиште на податоци може да се распадне на фокусирани податоци кои служат за одредени одделенија или функции. Овој пристап дава приоритет на единствен, интегриран извор на вистината.</p>
<hr/>
<h2>⚖️ Пристапи на Инмон против Кимбол</h2>
<p>Две истакнати методологии го водат дизајнот на складиштето за податоци: <span style="color: #59a8fb;"><strong>Пристапот од врвот надолу на Бил Инмон</strong></span> и <span style="color: #59a8fb;"><strong>Пристап од долу нагоре на Ралф Кимбал</strong></span>.</p>
<h3>⬆️ Инмон - пристап од врвот надолу</h3>
<p>Пристапот на Инмон нагласува градење а <span style="color: #59a8fb;"><strong>нормализиран Enterprise Data Warehouse (EDW)</strong></span> прво, што потоа ги храни специјализираните податоци за маркети.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Клучни принципи</strong></span>:</p><ul>
<li><p>Гради а <span style="color: #59a8fb;"><strong>нормализиран EDW</strong></span> прво.</p></li>
<li><p>Податоците се влеваат од изворните системи во EDW, а потоа во специјализирани податочни маркети.</p></li>
<li><p>Се фокусира на <span style="color: #59a8fb;"><strong>сеопфатна интеграција на податоци</strong></span> да се создаде единствен извор на вистината.</p></li>
<li><p>Користи <span style="color: #59a8fb;"><strong>Трета нормална форма (3NF)</strong></span> за основната структура на складиштето, обезбедувајќи стабилна конзистентност на податоците и намален вишок.</p></li>
</ul></li>
</ul>
<img alt="Inmon Data Warehouse Architecture" src="images/datawarehouses/dw-010.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Ограничувања</strong></span>:</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Одзема време и скапо</strong></span> да се спроведе.</p></li>
<li><p>Бара <span style="color: #59a8fb;"><strong>значително однапред планирање</strong></span> и дизајн.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Комплексни ETL процеси</strong></span> поради нормализација.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Побавни перформанси на барањето</strong></span> во споредба со димензионалните модели.</p></li>
<li><p>Помалку агилни и тешко се прилагодуваат <span style="color: #59a8fb;"><strong>менување на деловните барања</strong></span>.</p></li>
<li><p>Потребно е длабоко разбирање на <span style="color: #59a8fb;"><strong>целиот пејзаж на податоци на претпријатието</strong></span>.</p></li>
</ul></li>
</ul>
<h3>⬇️ Кимбол - пристап од долу нагоре</h3>
<p>Пристапот на Кимбал го нагласува градењето <span style="color: #59a8fb;"><strong>димензионални податоци мартови</strong></span> прво, вообичаено користејќи шеми со ѕвезди, а потоа нивно интегрирање преку усогласени димензии.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Клучни принципи</strong></span>:</p><ul>
<li><p>нагласува <span style="color: #59a8fb;"><strong>димензионално моделирање</strong></span>, првенствено користење <span style="color: #59a8fb;"><strong>шеми на ѕвезди</strong></span> за податоци мартови.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Најпрво се градат податочни маркети</strong></span>, фокусирајќи се на специфични деловни процеси (од долу-нагоре).</p></li>
<li><p>Се фокусира на <span style="color: #59a8fb;"><strong>леснотија на користење</strong></span> и брзи перформанси за пребарување за деловни корисници.</p></li>
<li><p>Користи <span style="color: #59a8fb;"><strong>денормализирани маси</strong></span> (факти и димензии) за намалување на спојувањата и подобрување на брзината.</p></li>
<li><p>Промовира „<span style="color: #59a8fb;"><strong>автобуска архитектура</strong></span>" за интегрирање на податочни маркети со усогласени димензии.</p></li>
<li><p>Дизајниран за <span style="color: #59a8fb;"><strong>агилен развој</strong></span> и брза испорака на аналитички решенија.</p></li>
</ul></li>
</ul>
<img alt="Архитектура на складиште на податоци на Кимбал" src="images/datawarehouses/dw-011.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Ограничувања</strong></span>:</p><ul>
<li><p>Потенцијал за <span style="color: #59a8fb;"><strong>вишок на податоци</strong></span> низ различни податочни маркети.</p></li>
<li><p>Може да доведе до <span style="color: #59a8fb;"><strong>недоследности</strong></span> ако усогласените димензии не се строго управувани.</p></li>
<li><p>Помалку погоден за сложени потреби за интеграција на податоци на ниво на целата компанија без внимателно планирање.</p></li>
<li><p>Не може да се справи со сите случаи на аналитичка употреба толку ефикасно како високо нормализираниот EDW.</p></li>
<li><p>Предизвици во одржувањето и развојот а <span style="color: #59a8fb;"><strong>голем број на различни податоци маркети</strong></span>.</p></li>
<li><p>Почетното поставување може да бара значителен напор во дефинирањето на димензиите и фактите.</p></li>
</ul></li>
</ul>
<hr/>
<h2>🌊 Инженерство на големи податоци и езера на податоци</h2>
<p><span style="color: #59a8fb;"><strong>Дата езера</strong></span> претставуваат промена на парадигмата во начинот на кој организациите складираат и управуваат со податоците за претпријатијата, прифаќајќи ја целосната разновидност на современи извори на податоци во масивни размери.</p>
<img alt="Инфраструктура на големи податоци со Дата Лејк" src="images/datawarehouses/dw-012.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p>За разлика од традиционалните магацини со крути шеми, езерата со податоци ја опфаќа целосната разновидност на современи извори на податоци, складирајќи сè во своите <span style="color: #59a8fb;"><strong>мајчин формат</strong></span> во масовни размери.</p></li>
<li><p>На врвот на езерото со податоци, може да се создадат повеќе слоеви за време на различни чекори на трансформација.</p></li>
</ul>
<h3>🆚 Магацин на податоци наспроти Езеро на податоци</h3>
<img alt="Магацин на податоци против Езеро на податоци" src="images/datawarehouses/dw-013.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Магацин на податоци</strong></span>: Податоците се обработуваат и организираат во една шема <em>пред</em> се става во магацинот. Анализата се прави на <span style="color: #59a8fb;"><strong>прочистени податоци</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Езерото на податоци</strong></span>: Сурови и неструктурирани податоци одат во езеро со податоци. Податоците се избираат и организираат како и кога е потребно (шема-на-читање).</p></li>
</ul>
<h3>🏗️ Архитектура на Дата Лејк</h3>
<p>Податоците течат од различни извори преку слоевите за внесување, во зони за складирање со различни нивоа на префинетост и на крајот служат повеќекратни шеми на потрошувачка.</p>
<h4>Што го дефинира езерото со податоци?</h4>
<p>Езерото на податоци е а <span style="color: #59a8fb;"><strong>централизирано складиште</strong></span> што ги складира сите податоци на претпријатието во нивниот природен, необработен формат. Ова вклучува структурирани, полуструктурирани, неструктурирани и бинарни податоци.</p>
<ul>
<li><p>Тоа е како природно езеро со повеќе притоки, кое прима континуирани текови на различни типови податоци во реално време.</p></li>
</ul>
<h4>Разбивање на силоси на податоци</h4>
<p>Податочни езера се појавија за решавање <span style="color: #59a8fb;"><strong>фрагментација на податоците на претпријатието</strong></span>. Организациите ги консолидираат сите податоци во единствено складиште кое може да се скалира, обично изградено на дистрибуирани системи како Hadoop или складирање на објекти во облак.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Суровини изворни податоци</strong></span>: Немодифицирани копии на податоци од изворни системи, со зачувување на оригиналниот контекст.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Трансформирани податоци</strong></span>: Обработени податоци оптимизирани за известување, визуелизација, напредна аналитика и машинско учење.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Аналитички средства</strong></span>: Курирани збирки на податоци, модели и функции подготвени за непосредни деловни сознанија.</p></li>
</ul>
<h4>Типови на податоци во езерото со податоци</h4>
<p>Податочните езера ги опфаќаат сите формати на податоци без дискриминација, дозволувајќи им на организациите да земат вредност од сите информациски средства.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Структурирани податоци</strong></span>: Табели за релациони бази на податоци со дефинирани шеми.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Неструктурирани податоци</strong></span>: Е-пошта, документи, PDF-датотеки, текстуални датотеки на кои им недостасуваат однапред дефинирани модели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Полуструктурирани податоци</strong></span>: CSV, логови, XML, JSON со флексибилни шеми.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Бинарни податоци</strong></span>: Слики, аудио, видео содржини.</p></li>
</ul>
<img alt="Архитектура на езерата на податоци" src="images/datawarehouses/dw-014.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Неограничен размер</strong></span>: Податочните езера можат да складираат секаков вид податоци во неговиот мајчин формат без фиксни ограничувања, зголемувајќи ги аналитичките перформанси и овозможувајќи домашна интеграција.</p></li>
</ul>
<h3>🌟 Придобивки и принципи на езерата на податоци</h3>
<h4>Стратешки предности</h4>
<p>Примарната цел на езерата со податоци е да понудат ан <span style="color: #59a8fb;"><strong>нерафиниран, сеопфатен преглед на податоците</strong></span> на научниците за податоци и аналитичарите, што доведува до а <span style="color: #59a8fb;"><strong>конкурентна предност</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Нови аналитички способности</strong></span>: Овозможете нови аналитички пристапи користејќи претходно недостапни извори на податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Флексибилност на шемата</strong></span>: Нема потреба од однапред моделирање на податоци во крути шеми на ниво на претпријатие.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Подобрен квалитет</strong></span>: Пристапот до необработени податоци ја подобрува длабочината и точноста на анализите.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Деловна агилност</strong></span>: Брзо прилагодување на променливите деловни прашања и аналитичките потреби.</p></li>
<li><p><span style="color: #59a8fb;"><strong>AI и ML Подготвени</strong></span>: Мајчин поддршка за машинско учење и оптоварување со вештачка интелигенција.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Конкурентна предност</strong></span>: Увидите базирани на податоци создаваат одржливи конкурентни предности.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Унифицирана архитектура</strong></span>: Елиминира силоси на податоци и фрагментирани системи за складирање.</p></li>
</ul>
<h4>Основни принципи</h4>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Прифатете ги сите податоци</strong></span>: Не се одбива внесување на податоци; сите податоци се вчитуваат од различни изворни системи и се задржуваат на неодредено време.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Зачувајте ја суровата состојба</strong></span>: Податоците се складираат во нетрансформирана или минимално трансформирана состојба, точно како што се примени.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Трансформирајте на барање</strong></span>: Податоците се трансформираат и структурираат врз основа на специфични барања за анализа, а не предодредени шеми.</p></li>
</ol>
<h3>🔑 Суштински концепти во управувањето со езерото со податоци</h3>
<p>Ефективното управување со езерото со податоци бара робусни способности во неколку области.</p>
<img alt="Управување со езерото со податоци" src="images/datawarehouses/dw-015.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Проголтување податоци</strong></span>: Конекторите повлекуваат податоци од различни извори и ги вчитуваат во езерото со податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Складирање на податоци</strong></span>: Скалабилно, економично складирање со брз пристап.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Управување со податоци</strong></span>: Управување со достапноста, употребливоста, безбедноста и интегритетот на сите податочни средства.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Безбедност</strong></span>: Повеќеслојна заштита имплементирана на секој слој.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Квалитет на податоци</strong></span>: Обезбедување висококвалитетни податоци за генерирање точни деловни сознанија; лошиот квалитет води до лоши одлуки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Откривање на податоци</strong></span>: Техники за означување и каталогизација за изразување и споделување на разбирањето на податоците.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ревизија на податоци</strong></span>: Оценување на ризикот, усогласеноста и почитувањето на регулаторните барања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Линија на податоци</strong></span>: Следење на потеклото на податоците, трансформациите и движењето низ екосистемот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Истражување на податоци</strong></span>: Почетна фаза на анализа на податоците што овозможува формирање хипотеза.</p></li>
</ul>
<hr/>
<h2>📊 Магацин на податоци наспроти споредба на езерата на податоци</h2>
<p>Организациите обично бараат и складиште на податоци и езеро со податоци, бидејќи тие служат фундаментално различни потреби и случаи на употреба.</p>
<h3>Карактеристики на складиште на податоци</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Предефинирана структура</strong></span>: Структурата на податоците и шемата се однапред дефинирани (шема-на-пишување).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Чисто и збогатено</strong></span>: Податоците се чистат, збогатуваат и трансформираат пред складирањето.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Единствен извор на вистината</strong></span>: Служи како авторитетен, конзистентен приказ на податоците на претпријатието.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Структуриран фокус</strong></span>: Примарно се справува со релациони податоци со добро дефинирани шеми.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Деловни корисници</strong></span>: Оптимизиран за SQL-базирани извештаи и алатки за деловна интелигенција.</p></li>
</ul>
<h3>Карактеристики на податочното езеро</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Флексибилна структура</strong></span>: Структурата на податоците или шемата не се дефинирани во времето на внесување (шема-на-читање).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Складирање необработени податоци</strong></span>: Податоците се чуваат во својот мајчин формат без претходна трансформација.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Повеќекратни можности</strong></span>: Поддржува многу можни аналитички пристапи за истите податоци.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Различни типови на податоци</strong></span>: Сместува релациски и нерелациски податоци (мобилни апликации, IoT, социјални медиуми).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Научници за податоци</strong></span>: Овозможува напредна аналитика, машинско учење и истражувачка наука за податоци.</p></li>
</ul>

<h2>🚫 Езеро на податоци наспроти мочуриште на податоци: избегнување замки</h2>
<p>А <span style="color: #59a8fb;"><strong>податочно мочуриште</strong></span> е езеро на податоци кое се расипало во неуправувано складиште, каде што податоците стануваат недостапни или обезбедуваат минимална вредност поради несоодветното управување со податоците.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Ризикот од лошо владеење</strong></span>: Без соодветна каталогизација, контрола на квалитетот и управување со метаподатоци, езерото со податоци може да стане депонија наместо вредно средство.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Практични предизвици за пристапност</strong></span>: Додека езерата со податоци теоретски нудат пристап до сите податоци, тешкотиите во парсирањето на неструктурираните податоци создаваат бариери за генерирање на увид.</p></li>
</ul>
<p>Организациите мора да инвестираат во <span style="color: #59a8fb;"><strong>каталогизација на податоци, рамки за управување и управување со квалитетот</strong></span> за да се спречи податочните езера да станат мочуришта.</p>
<img alt="Управување со метаподатоци на Езерото на податоци наспроти мочуриште на податоци" src="images/datawarehouses/dw-016.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Управување со метаподатоци</strong></span>: Сеопфатно каталогизирање и означување на сите податочни средства за откривање.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Политики за пристап</strong></span>: Јасни политики за управување кои дефинираат кој до кои податоци може да пристапи.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Контроли за квалитет на податоците</strong></span>: Автоматска валидација и проверки на квалитетот за да се обезбеди веродостојност на податоците.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Управување со животниот циклус</strong></span>: Дефинирани политики за задржување и архивски стратегии за да се спречи неограничена акумулација на податоци.</p></li>
</ul>

<h2>💎 Архитектура на Lakehouse (медалјон).</h2>
<p>На <span style="color: #59a8fb;"><strong>Lakehouse (медалјон) архитектура</strong></span> е хибридна архитектура на податоци која ги комбинира флексибилноста и економичноста на езерата со податоци со робусното управување со податоци и способностите за трансакции со ACID на складиштата на податоци. Ги организира податоците во различни слоеви, прогресивно подобрувајќи го квалитетот на податоците.</p>
<h3>Клучни принципи</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Слоевит пристап</strong></span>: Организира податоци во три различни слоеви: <span style="color: #59a8fb;"><strong>Бронза (сурова), сребро (рафинирано) и злато (куриран)</strong></span>, подобрување на квалитетот на податоците во секоја фаза.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Фондацијата на езерото Делта</strong></span>: Често се гради на езерото Делта, обезбедувајќи <span style="color: #59a8fb;"><strong>ACID трансакции, спроведување на шема, верзии на податоци и патување низ времето</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Бронзен слој (суров)</strong></span>: Ги внесува изворните податоци како што се, обезбедувајќи <span style="color: #59a8fb;"><strong>историска непроменливост</strong></span> и целосна следливост.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сребрен слој (рафиниран)</strong></span>: Применува чистење, филтрирање и основни трансформации, често спојувајќи податоци од повеќе бронзени табели за <span style="color: #59a8fb;"><strong>конзистентен поглед</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Златен слој (куриран)</strong></span>: Испорачува збирни, денормализирани и високо оптимизирани податоци за одредени <span style="color: #59a8fb;"><strong>апликации за деловна интелигенција, известување и машинско учење</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Прогресивен квалитет на податоци</strong></span>: Квалитетот и доверливоста на податоците се зголемуваат како што податоците се движат низ слоевите.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Унифицирана обработка</strong></span> за пренос и сериски податоци.</p></li>
</ul>
<img alt="Архитектонски слоеви на Lakehouse" src="images/datawarehouses/dw-017.png" style="max-width: 500px; margin-left: 0"/>
<h3>Ограничувања</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Зголемена сложеност</strong></span>: Повеќе слоеви може да додадат сложеност на цевководите за податоци, особено за помали проекти.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Databricks/Специфично за делта на езерото</strong></span>: Целосната имплементација честопати користи специфични карактеристики на платформата Databricks Lakehouse, што потенцијално води до <span style="color: #59a8fb;"><strong>заклучување на продавачот</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Интензивни ресурси</strong></span>: Складирањето и обработката на податоци во три слоја може да потроши повеќе складирање и пресметување ресурси доколку не се оптимизираат.</p></li>
</ul>
<h3>🗺️ Архитектура на медалјони: Објаснети зони</h3>
<p>Медалјонската архитектура ги категоризира податоците во различни зони, секоја со одредена цел.</p>
<img alt="Медалјонски архитектонски зони" src="images/datawarehouses/dw-018.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Бронза (Сурови податоци)</strong></span>: Почетната зона на фаза/слетување каде што сировите, непроменливи податоци се внесуваат како што се, служејќи како <span style="color: #59a8fb;"><strong>историски запис</strong></span> на изворните податоци. Овозможува различни начини на внесување податоци од различни извори.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сребро (исчистено и рафинирано)</strong></span>: доверливата зона каде што податоците се чистат, потврдуваат и трансформираат. Служи како а <span style="color: #59a8fb;"><strong>сигурен единствен извор на вистината</strong></span> за понатамошна обработка. Поддржува паралелно/независно голтање.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Злато (курирано и собрано)</strong></span>: оваа зона обезбедува високо курирани, собрани и оптимизирани податоци за одредени <span style="color: #59a8fb;"><strong>апликации за деловна интелигенција, известување и машинско учење</strong></span>. Се одликува со консолидирани податоци и усогласени димензии.</p></li>
</ul>
<h4>Дополнителни специјализирани зони</h4>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Зона на песок</strong></span>: Флексибилна, изолирана средина за научниците за податоци и аналитичарите да експериментираат без да влијаат на производството.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Резервна зона</strong></span>: Посветен на складирање на копии од податоци за враќање од катастрофи, обезбедувајќи континуитет во работењето.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Архивска зона</strong></span>: За долгорочно (ладно) складирање на неактивни историски податоци, од клучно значење за усогласеноста и намалување на трошоците.</p></li>
</ul>
<h3>🔒 Медалјон: перспектива за заштита на PII</h3>
<p>Од перспектива на приватност и безбедност, архитектурата на медалјонот имплементира прогресивна заштита на податоците и <span style="color: #59a8fb;"><strong>информации за лична идентификација (PII)</strong></span> ракување.</p>
<img alt="Медалјон PII заштита" src="images/datawarehouses/dw-019.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Бронза: PII шифрирана</strong></span>: Необработените податоци содржат шифрирани полиња за PII, со што се одржува усогласеноста додека се зачувува алатката за податоци за овластените корисници.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сребрена: PII маскирани</strong></span>: Чувствителните полиња се маскирани или токенизирани, што овозможува поширок пристап додека ја штити индивидуалната приватност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Злато: Агрегирани PII</strong></span>: Агрегираните метрики ги елиминираат податоците на индивидуално ниво, овозможувајќи широка дистрибуција без загриженост за приватноста.</p></li>
</ul>
<p>Овој повеќеслоен пристап ги поддржува регулаторните барања како GDPR, CCPA и HIPAA.</p>

<h3>☁️ Архитектура на медалјони со повеќе облаци</h3>
<p>А <span style="color: #59a8fb;"><strong>Архитектура на медалјони со повеќе облаци</strong></span> е дизајниран да ги обработува и рафинира податоците низ различни даватели на облак (AWS, Azure, GCP).</p>
<img alt="Архитектура на медалјони со повеќе облаци" src="images/datawarehouses/dw-020.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Интеграција и синхронизација</strong></span>: користи алатки за агностика на облак или директни врски од облак до облак за да се обезбеди <span style="color: #59a8fb;"><strong>беспрекорен проток на податоци</strong></span> и конзистентност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Придобивки</strong></span>:</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Избегнување на заклучување на продавачот</strong></span>: Флексибилност за избор на најдобри услуги од различни даватели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Искористување на најдобрите услуги</strong></span>: Користете специјализирани услуги уникатни за секој облак.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Географска дистрибуција</strong></span>: Подобрете ја локацијата на податоците, враќањето при катастрофи и усогласеноста.</p></li>
<li><p>Минимизирање на движењето на податоците и усогласување со строгите прописи за престој на податоци.</p></li>
<li><p>Одржување на деловниот континуитет.</p></li>
</ul></li>
</ul>
<h3>🏠 Хибриден на-прем пристап</h3>
<p>Овој пристап ја проширува архитектурата на медалјонот на <span style="color: #59a8fb;"><strong>средини во просториите</strong></span>, дозволувајќи им на организациите да одржуваат контрола врз нивните податоци.</p>
<img alt="Архитектура на хибридни медалјони On-Prem" src="images/datawarehouses/dw-021.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p>Медалјонските зони (бронзени, сребрени, златни) може да се имплементираат со користење на различни <span style="color: #59a8fb;"><strong>Технологии за складирање и обработка во просториите</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Опции за складирање</strong></span>: HDFS (Hadoop Distributed File System) и MinIO (складирање објекти компатибилен со S3).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Формати и обработка на табели</strong></span>: Hive, Kudu и Apache Iceberg.</p></li>
<li><p>Оваа флексибилност овозможува целосно искористување на постоечката on-prem инфраструктура без да се загрози интегритетот на моделот на медалјонот.</p></li>
<li><p>Клучно за обраќање <span style="color: #59a8fb;"><strong>строги барања за суверенитет на податоци и усогласеност</strong></span>.</p></li>
</ul>
<h3>🧠 Медалјон во системи базирани на RAG</h3>
<p>Медалјонската архитектура може да се прилагоди за <span style="color: #59a8fb;"><strong>Враќање на зголемена генерација (RAG)</strong></span> базирани системи, обезбедувајќи структуриран пристап за обработка на податоци за оптимално пребарување на модел на голем јазик (LLM).</p>
<img alt="Архитектура на медалјони за RAG системи" src="images/datawarehouses/dw-022.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Бронзен слој</strong></span>: Внесува необработени, мултимодални податоци (текст, слики, аудио, видео) директно од различни извори, складирани во неговиот оригинален, непроменлив формат.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сребрен слој</strong></span>: Обработува податоци од бронза, што вклучува чистење, нормализација, делење текст, генерирање вградувања, OCR за слики и транскрипција за аудио. Целта е да се рафинираат податоците во a <span style="color: #59a8fb;"><strong>конзистентен и употреблив формат</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Златен слој</strong></span>: Сместува оптимизирано <span style="color: #59a8fb;"><strong>векторска база на податоци</strong></span> кои содржат индексирани вградувања. Овие рафинирани податоци се подготвени за ефикасно пребарување од LLM, формирајќи висококвалитетна база на знаење за работните текови на RAG.</p></li>
</ul>
<p>Овој систематски пристап обезбедува <span style="color: #59a8fb;"><strong>супериорен квалитет на податоците, целосна следливост на лозата на податоците и значително оптимизирани перформанси за пребарување</strong></span> за RAG апликации.</p>
<hr/>
<h2>⏳ Сериска наспроти стриминг обработка на податоци</h2>
<p>Разбирање на фундаменталните разлики помеѓу <span style="color: #59a8fb;"><strong>серија</strong></span> и <span style="color: #59a8fb;"><strong>стриминг обработка на податоци</strong></span> е од клучно значење за дизајнирање ефикасни и одговорни архитектури на податоци.</p>
<h3>Сериска обработка</h3>
<ul>
<li><p>Процеси <span style="color: #59a8fb;"><strong>голем обем на податоци во закажани интервали</strong></span>.</p></li>
<li><p>Податоците се собираат со текот на времето и се обработуваат во <span style="color: #59a8fb;"><strong>парчиња</strong></span>.</p></li>
<li><p>Погоден за операции каде <span style="color: #59a8fb;"><strong>латентноста не е критична</strong></span> (на пример, дневни извештаи, месечен платен список).</p></li>
<li><p>Оптимизиран за <span style="color: #59a8fb;"><strong>висока пропусност</strong></span> и сложени трансформации.</p></li>
<li><p>Пример: Финансиски усогласувања на крајот на денот.</p></li>
</ul>
<h3>Обработка на стриминг</h3>
<ul>
<li><p>Обработува податоци <span style="color: #59a8fb;"><strong>континуирано како што пристигнува</strong></span>.</p></li>
<li><p>Податоците се обработуваат во <span style="color: #59a8fb;"><strong>мали зголемувања или настани</strong></span>.</p></li>
<li><p>Суштински за сценарија кои бараат <span style="color: #59a8fb;"><strong>увиди во реално време</strong></span> и непосредни дејства (на пр., откривање измама, контролни табли во живо).</p></li>
<li><p>Оптимизиран за <span style="color: #59a8fb;"><strong>ниска латентност</strong></span> и брза реакција.</p></li>
<li><p>Пример: Анализа на податоци од сензори во реално време.</p></li>
</ul>
<img alt="Обработка на серија наспроти стриминг" src="images/datawarehouses/dw-023.png" style="max-width: 500px; margin-left: 0"/>
<h3>Интегрирање на стриминг и сериски податоци: предизвици</h3>
<p>Интегрирањето на двата типа на обработка воведува специфични предизвици:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Голтање во реално време</strong></span>: Фактите и димензиите од апликациите со кои се соочуваат клиентите се трошат речиси во реално време, се трансформираат и се складираат во делта табели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Сериска обработка</strong></span>: Димензиите кои сè уште не се проследени се внесуваат во серија ETL од различни делови на системот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Приклучи се на предизвикот</strong></span>: Некои стримувани факти може да упатуваат на копчиња од табела со димензии кои сè уште не постојат, што бара внимателно ракување.</p></li>
</ol>
<img alt="Гасовод за податоци со Кафка и езерото Делта" src="images/datawarehouses/dw-024.png" style="max-width: 500px; margin-left: 0"/>

<h1>📐 Димензионално моделирање: матрица со автобус</h1>
<p>На <span style="color: #59a8fb;"><strong>Автобуска матрица</strong></span> е основна алатка во складирањето на податоци на претпријатијата, која го води развојот на аналитички решенија преку мапирање на деловните процеси до заеднички димензии. Пристапот на Ралф Кимбал нагласува дека димензионалното моделирање е изградено врз деловните процеси, при што Enterprise Data Warehouse е збир на усогласени и интегрирани модели.</p>
<h2>🚌 Автобуска матрица: Основа за складирање на податоци на претпријатија</h2>
<p>Автобуската матрица е <span style="color: #59a8fb;"><strong>модел на високо ниво</strong></span> на деловните процеси кои се извршуваат дневно, неделно или месечно. Ги наведува деловните процеси на едноставен деловен јазик, објаснувајќи што е секој процес, неговата фреквенција, што може да се мери и кои се клучните играчи.</p>
<ul>
<li><p>Ги наведува <span style="color: #59a8fb;"><strong>табели со факти</strong></span> и <span style="color: #59a8fb;"><strong>табели со димензии</strong></span> потребни.</p></li>
<li><p>Може да се создаде и разбере со <span style="color: #59a8fb;"><strong>деловните чинители</strong></span>.</p></li>
<li><p>Ги складира сите информации што му се потребни на тимот за податоци.</p></li>
</ul>
<h2>❓ Дефинирајте деловен проблем</h2>
<p>Димензионалното моделирање започнува со разбирање на деловниот проблем. Мапите на матрицата на автобусот <span style="color: #59a8fb;"><strong>споделени димензии (колони)</strong></span> против <span style="color: #59a8fb;"><strong>деловни процеси (редови)</strong></span>, овозможувајќи зголемување на развојот на средствата за податоци.</p>
<ul>
<li><p>Дизајнот одредува <span style="color: #59a8fb;"><strong>факт податоци зрно</strong></span> и потребните димензии за достапни, побрзи прашања.</p></li>
</ul>
<img alt="Заеднички димензии на матрицата на магистралата" src="images/datawarehouses/dw-025.png" style="max-width: 500px; margin-left: 0"/>
<h2>🚶 Четирите чекори на димензионално моделирање</h2>
<p>За димензионално моделирање на бизнис процес, следете ги овие четири чекори:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте го деловниот процес</strong></span>: Дефинирајте ја конкретната деловна активност што треба да се мери и анализира.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте ги димензиите</strong></span>: Дефинирајте ги објектите и контекстот што го опишуваат деловниот процес.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте го житото</strong></span>: Одредете го нивото на детали за секое мерење во процесот.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Идентификувајте ги фактите</strong></span>: Наведете ги мерливите метрики што го квантифицираат деловниот процес.</p></li>
</ol>
<p>Овој процес обично трае 1-2 дена по деловен процес, што бара a <span style="color: #59a8fb;"><strong>експерт за предметни прашања</strong></span> и а <span style="color: #59a8fb;"><strong>архитект на податоци</strong></span> со знаење за димензионално моделирање.</p>
<h2>🍋 Пример: Среќен штанд за лимонада</h2>
<p>Размислете за бизнис со штанд за лимонади со неколку процеси:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Продавам лимонада</strong></span>: Трансакциски процес на продажба на очила (<span>$1 за 33cl) или шишиња ($</span>3 за 1 литар) на клиентите.</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Карактеристики на процесот</strong></span>: Трансакциски, жито при индивидуална продажба, не сите клиенти имаат картички за лојалност.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Придобивки од програмата за лојалност</strong></span>: 5 чаши за 4 (наспроти 5 редовни), 2 шишиња за 5,50 (наспроти 6 редовни), бара следење на социјалните мрежи.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Купете состојки</strong></span>: Процес на набавка на лимони и други состојки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изработка на лимонада</strong></span>: Процес на производство (50-литарски галон секој викенд, од 10:00 до 14:00 часот).</p></li>
</ul>
<img alt="Стенд за лимонада" src="images/datawarehouses/dw-026.png" style="max-width: 500px; margin-left: 0"/>
<h3>Изградба на модел на матрица на автобуси</h3>
<p>За процесот „Продавање лимонада“:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Чекор 3: Идентификувајте ги димензиите</strong></span>:</p><ol>
<li><p><span style="color: #59a8fb;"><strong>Датум и време</strong></span>: Кога продажбата се случила за време на викенд операции (10:00-14:00).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Производ</strong></span>: Стакло (33 cl) или шише (1 литар) со атрибути за волумен и цена.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Програма за лојалност</strong></span>: Изборна димензија (означена со О) за следење на попустот.</p></li>
</ol></li>
<li><p><span style="color: #59a8fb;"><strong>Чекор 4: Идентификувајте мерки</strong></span>:</p><ol>
<li><p><span style="color: #59a8fb;"><strong>Клучни мерки</strong></span>: продадени единици, цена, волумен на производот и дадени попусти.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Потребни димензии</strong></span>: Датум, време, програма за лојалност и производ.</p></li>
</ol></li>
</ul>
<p>Резултатот е модел на еден процес: а <span style="color: #59a8fb;"><strong>табела за трансакциски факти</strong></span> со 4 димензионални столбови и 4 мерки. Овој модел може да се тестира со поставување прашања и евалуација на потребите за известување <em>без пишување никаков код</em>.</p>

<h2>📈 Комплетна автобуска матрица: Возна вредност</h2>
<p>Со повторување на 4-те чекори за сите процеси, се создава сеопфатна магистрална матрица, поврзувајќи повеќе табели со факти преку <span style="color: #59a8fb;"><strong>споделени димензии</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Комплексна анализа</strong></span>: Изведете анализа на сите 4 процеси додека табелите со факти се поврзуваат преку споделени димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Оптимизација на процесот</strong></span>: Идентификувајте серии со најмногу отпад и управувајте со нарачките за купување за да ја задоволите очекуваната побарувачка.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Агилен развој</strong></span>: Водете приоретизација и применувајте агилни методологии со деизбирање на делови без да пропуштите важни елементи.</p></li>
</ul>
