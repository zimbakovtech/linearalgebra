<tr><td style="background: #FFF4E6;"><p>Making Lemonade</p></td><td><p>One row for each batch of lemonade made, per product</p></td><td style="background: #FFF4E6;"><p>Volume, Units</p></td><td><p>X</p></td><td style="background: #FFF4E6;"><p>O</p></td><td><p>O</p></td><td style="background: #FFF4E6;"><p>O</p></td><td><p>O</p></td><td style="background: #FFF4E6;"><p>X</p></td><td><p>X</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Purchase Ingredients</p></td><td><p>One row for each item purchased for making lemonade</p></td><td style="background: #FFF4E6;"><p>Units, Cost</p></td><td><p>X</p></td><td style="background: #FFF4E6;"><p>X</p></td><td><p>O</p></td><td style="background: #FFF4E6;"><p>X</p></td><td><p>X</p></td><td style="background: #FFF4E6;"><p>O</p></td><td><p>X</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Waste</p></td><td><p>One row for each ingredient or product that is thrown to the garbage as waste</p></td><td style="background: #FFF4E6;"><p>Units</p></td><td><p>O</p></td><td style="background: #FFF4E6;"><p>O</p></td><td><p>O</p></td><td style="background: #FFF4E6;"><p>X</p></td><td><p>X</p></td><td style="background: #FFF4E6;"><p>O</p></td><td><p>O</p></td></tr>
</table>
<h2>📈 Complete Bus Matrix: Driving Value</h2>
<p>By repeating the 4 steps for all processes, a comprehensive Bus Matrix is created, linking multiple fact tables through <span style="color: #59a8fb;"><strong>shared dimensions</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Complex Analysis</strong></span>: Perform analysis across all 4 processes as fact tables link via shared dimensions.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Process Optimization</strong></span>: Identify batches with most waste and manage purchase orders to meet expected demand.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Agile Development</strong></span>: Drive prioritization and apply agile methodologies by de-selecting parts without missing important elements.</p></li>
</ul>
<img alt="Business Dashboard" src="images/datawarehouses/dw-028.png" style="max-width: 500px; margin-left: 0"/>
<p>The Bus Matrix allows for building an <span style="color: #59a8fb;"><strong>enterprise data warehouse incrementally</strong></span>, delivering business value process by process while maintaining integration and flexibility for future growth.</p>
<hr/>
<h2>🌟 Data Modeling Approaches: Star Schema</h2>
<p>Data modeling approaches form a hierarchical pyramid, reflecting how data is progressively refined and optimized for different purposes within a data platform.</p>
<img alt="Data Architecture Pyramid" src="images/datawarehouses/dw-029.png" style="max-width: 500px; margin-left: 0"/>
<p>This pyramid illustrates the flow from highly structured operational data, through integration layers, to simplified analytical models for business consumption.</p>
<h3>🏛️ Transactional Database (3NF)</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: Manages day-to-day operations of an organization (e.g., sales, inventory, orders).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Data Type</strong></span>: Stores current, real-time, and highly detailed data.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Structure</strong></span>: Optimized for CRUD (Create, Read, Update, Delete) operations.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Design</strong></span>: Highly <span style="color: #59a8fb;"><strong>normalized</strong></span> to minimize redundancy and ensure data integrity (typically <span style="color: #59a8fb;"><strong>Third Normal Form - 3NF</strong></span>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Query Pattern</strong></span>: Primarily handles simple, quick queries for transaction processing.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Performance</strong></span>: Focused on fast data insertion and updates rather than complex analytical queries.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Examples</strong></span>: ERP systems, CRM systems, order processing systems.</p></li>
</ul>
<img alt="Transactional Database ERD" src="images/datawarehouses/dw-030.png" style="max-width: 500px; margin-left: 0"/>
<h3>🌠 Dimensional Modeling: Star Schema</h3>
<p>The <span style="color: #59a8fb;"><strong>star schema</strong></span> is a foundational design for data warehouses, optimizing data for analytical processing.</p>
<img alt="Star Schema" src="images/datawarehouses/dw-031.png" style="max-width: 500px; margin-left: 0"/>
<h4>Star Schema Characteristics</h4>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: Organizes data into <span style="color: #59a8fb;"><strong>facts and dimensions</strong></span> for analytical processing (OLAP).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Structure</strong></span>: A central <span style="color: #59a8fb;"><strong>fact table</strong></span> connected to multiple <span style="color: #59a8fb;"><strong>dimension tables</strong></span>, resembling a star shape.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Fact Table</strong></span>: Stores quantitative data (<span style="color: #59a8fb;"><strong>measures</strong></span>), such as sales, revenue, or quantities.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Dimension Tables</strong></span>: Contain descriptive attributes (<span style="color: #59a8fb;"><strong>context</strong></span>), e.g., customer, time, product.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Normalization</strong></span>: Typically <span style="color: #59a8fb;"><strong>denormalized</strong></span> for performance in data retrieval and reporting, reducing the need for joins.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Query Performance</strong></span>: Optimized for fast read-heavy operations and aggregations.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Simple Design</strong></span>: Easy to understand and query, suitable for BI tools.</p></li>
</ul>
<h3>❄️ Dimensional Modeling: Snowflake Schema</h3>
<p>The <span style="color: #59a8fb;"><strong>snowflake schema</strong></span> is a more normalized version of the star schema.</p>
<img alt="Snowflake Schema" src="images/datawarehouses/dw-032.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: A more normalized version of the star schema, used for analytical processing.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Structure</strong></span>: Fact table at the center, surrounded by normalized dimension tables, which may have further sub-dimensions. This creates a branching structure.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Normalization</strong></span>: Higher normalization (typically 3NF) reduces redundancy but can complicate queries due to more joins.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Fact Table</strong></span>: Stores quantitative data (e.g., sales revenue, units sold).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Dimension Tables</strong></span>: More complex and divided into multiple related tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Query Performance</strong></span>: May be slower than star schema due to increased joins.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Storage Efficiency</strong></span>: More efficient for storage due to reduced redundancy.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example Use Case</strong></span>: Complex analytics where data consistency and storage are critical.</p></li>
</ul>
<h3>📊 Fact Table</h3>
<p>The <span style="color: #59a8fb;"><strong>fact table</strong></span> is the central component in a star or snowflake schema, storing measurable business metrics.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: Contains measurable business metrics related to events (sales, appointments, etc.).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Data Type</strong></span>: Stores <span style="color: #59a8fb;"><strong>numeric data</strong></span>, such as sales revenue, transaction count, or profit.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Granularity</strong></span>: Defined by the level of detail of the data (e.g., daily, hourly).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Key Columns</strong></span>: Contains <span style="color: #59a8fb;"><strong>foreign keys</strong></span> to dimension tables (e.g., <code>product_id</code>, <code>time_id</code>, <code>customer_id</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Measures</strong></span>: Contains numeric facts or aggregatable measures (e.g., total sales).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Performance</strong></span>: Optimized for fast aggregation and analysis.</p></li>
</ul>
<img alt="Star Schema Fact Table" src="images/datawarehouses/dw-033.png" style="max-width: 500px; margin-left: 0"/>
<p>The sales fact table contains foreign keys to dimensions plus numeric metrics (e.g., Revenue, UnitsSold) that measure business performance.</p>
<h3>🌳 Dimension Table</h3>
<p><span style="color: #59a8fb;"><strong>Dimension tables</strong></span> provide the descriptive context for the facts in a data warehouse.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: Describes the context of the facts in a data warehouse or analytical model.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Data Type</strong></span>: Stores <span style="color: #59a8fb;"><strong>descriptive, categorical data</strong></span> (e.g., customer names, product categories).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Structure</strong></span>: Contains attributes that provide the "dimensions" for analysis (e.g., time, location).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Keys</strong></span>: Each dimensional table is usually linked to a fact table via a <span style="color: #59a8fb;"><strong>foreign key</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Denormalization</strong></span>: Often denormalized for faster querying and simplicity.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example Columns</strong></span>: Customer name, product type, region, time period.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Use Case</strong></span>: Allows users to <span style="color: #59a8fb;"><strong>slice and dice facts</strong></span> by different attributes (e.g., sales by region, product).</p></li>
</ul>
<img alt="Dimension Table Relationships" src="images/datawarehouses/dw-034.png" style="max-width: 500px; margin-left: 0"/>
<p>Product, Store, Customer, and Date dimensions provide contextual information, joining with facts to answer specific business questions like monthly product popularity or quarterly store performance.</p>
<h2>🛠️ Steps of Designing a Star Schema Model</h2>
<p>Designing an effective star schema model involves a systematic approach:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Identify the Business Process</strong></span>: Define the key business activities to be analyzed, including relevant metrics, KPIs, and initial dimensions.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Select Granularity</strong></span>: Determine the lowest level of detail for your data. Start at the finest grain, considering trade-offs between storage costs and query performance.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Determine Dimensions</strong></span>: Design dimension tables with unique, not-null primary keys. These tables provide descriptive context for the facts.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Consolidate the Facts</strong></span>: Store quantitative metrics and measures in fact tables, linking them to dimension tables using foreign keys.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Build a Schema</strong></span>: Choose the appropriate schema type (star, snowflake, or fact constellation) and implement it, ideally via infrastructure as code with automated tests.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Optimize for Query Performance</strong></span>: Index the fact table on key columns (foreign keys) for efficient querying. Create derived fact tables for high-level aggregations.</p></li>
</ol>
<h3>✅ Benefits of Star Schema Models</h3>
<img alt="Benefits of Star Schema Models" src="images/datawarehouses/dw-035.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Simplicity</strong></span>: Easy to understand and navigate due to its clear, intuitive structure. Queries are straightforward with minimal joins.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Query Performance</strong></span>: Optimized for read-heavy analytical queries, especially when aggregating data. Denormalized structure leads to faster query performance and reduced need for joins.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Separation of Facts and Dimensions</strong></span>: Easy to maintain and update facts and dimensions independently. Dimensions remain stable over time, while facts may change or grow.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Scalability</strong></span>: Easily extendable as new dimensions or facts can be added without significant redesign. Great for large datasets with many dimensions and measures.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Business User Accessibility</strong></span>: Simple, understandable structure is more accessible to business analysts and non-technical users. Direct support for Business Intelligence (BI) tools and dashboards.</p></li>
</ul>
<h3>❌ Drawbacks of Star Schema Models</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Limited Agility for Changes</strong></span>:</p><ul>
<li><p>Adding new sources or making structural changes can be challenging.</p></li>
<li><p>Changes in business requirements often require redesign or schema restructuring.</p></li>
<li><p>Changes of fact table granularity require reloading.</p></li>
<li><p>Historic refill (backfill) can be challenging.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Maintenance Complexity</strong></span>:</p><ul>
<li><p>Managing large fact tables with a high number of records can become difficult.</p></li>
<li><p>Ensuring consistency across fact tables with different granularities can be complex.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Potential for Data Integrity Issues</strong></span>: If dimension tables are not properly maintained, data integrity issues may arise, especially with attributes that change frequently.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Data Redundancy</strong></span>: Due to denormalization, dimension tables may contain redundant data, leading to higher storage costs. Updates to dimension attributes require updating multiple rows.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Not Ideal for Real-Time Processing</strong></span>: Optimized for historical data analysis and may not support real-time transaction processing or low-latency updates.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Lack of Flexibility for Complex Relationships</strong></span>: More complex many-to-many relationships may be harder to model.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Maintenance Nightmare</strong></span>: The effort and cost of maintaining information marts can increase significantly over time.</p></li>
</ul>
<img alt="ETL Complexity Factors" src="images/datawarehouses/dw-036.png" style="max-width: 500px; margin-left: 0"/>
<hr/>
<h1>🌳 Dimensional Modeling: Dimension Tables</h1>
<p>Dimension tables are crucial in dimensional modeling, providing descriptive context for the facts in a data warehouse. They represent entities relevant to business and analytics requirements, such as products, people, places, dates, and times.</p>
<h2>📝 Understanding Dimension Tables</h2>
<p>In a dimensional model, a <span style="color: #59a8fb;"><strong>dimension table</strong></span> describes an entity relevant to your business and analytics requirements. These tables typically represent:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>What</strong></span>: Items sold or manufactured.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Where</strong></span>: Locations, regions, stores.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Who</strong></span>: Customers, employees, salespeople.</p></li>
<li><p><span style="color: #59a8fb;"><strong>When</strong></span>: Dates and timestamps of events.</p></li>
</ul>
<p>Dimension tables are often prefixed with <code>d_</code> or <code>Dim_</code> for easy identification.</p>
<img alt="Star Schema with Dimension Tables" src="images/datawarehouses/dw-037.png" style="max-width: 500px; margin-left: 0"/>
<p>Example <code>d_Salesperson</code> table structure:</p>
<pre><code class="language-sql">CREATE TABLE d_Salesperson (
    Salesperson_SK INT NOT NULL, -- Surrogate key
    EmployeeID VARCHAR(20) NOT NULL, -- Natural key(s)
    FirstName VARCHAR(20) NOT NULL,
    -- ... other dimension attributes
    SalesRegion_FK INT NOT NULL, -- Foreign key(s) to other dimensions
    -- Historical tracking attributes (SCD type 2)
    RecChangeDate_FK INT NOT NULL,
    RecValidFromKey INT NOT NULL,
    RecValidToKey INT NOT NULL,
    RecReason VARCHAR(15) NOT NULL,
    RecIsCurrent BIT NOT NULL,
    -- Audit attributes
    AuditMissing BIT NOT NULL,
    AuditIsInferred BIT NOT NULL,
    AuditCreatedDate DATE NOT NULL,
    AuditCreatedBy VARCHAR(15) NOT NULL,
    AuditLastModifiedDate DATE NOT NULL,
    AuditLastModifiedBy VARCHAR(15) NOT NULL
);</code></pre>
<h2>🔑 Surrogate Keys: The Foundation</h2>
<p>A <span style="color: #59a8fb;"><strong>surrogate key</strong></span> is a single-column unique identifier, generated and stored in the dimension table. It serves as the primary key for relating to other tables in the dimensional model.</p>
<h3>Key Benefits</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Consolidate multiple data sources</strong></span> without identifier clashes.</p></li>
<li><p>Convert multi-column natural keys into efficient <span style="color: #59a8fb;"><strong>single-column keys</strong></span>.</p></li>
<li><p>Track dimension history with <span style="color: #59a8fb;"><strong>SCD type 2</strong></span>.</p></li>
<li><p>Optimize fact table storage with the smallest possible integer data type.</p></li>
</ul>
<h3>Best Practice</h3>
<p>A surrogate key column is recommended even when a natural key seems acceptable. Avoid giving meaning to key values, except for date and time dimension keys.</p>
<h3>Dimension Surrogate Keys Generation Approaches</h3>
<table>
<tr><th><p>Approach</p></th><th><p>Pros</p></th><th><p>Cons</p></th></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Hash of the business (natural) key</strong></span> (e.g., SHA256 or MD5)</p></td><td><p>Can be processed in a distributed environment; Reloads generate the same values; Doesn't require joins to dimensions to identify the surrogate key when loading fact tables</p></td><td style="background: #FFF4E6;"><p>Requires that the business key is stable; Not as user-friendly as INT keys</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Generate GUID</strong></span> (Globally Unique Identifier)</p></td><td><p>Can be processed in a distributed environment</p></td><td style="background: #FFF4E6;"><p>Requires joins to dimensions to load fact tables; Not as user-friendly as INT keys; Reloads generate new values, so if a dimension table is reloaded, all fact tables that reference it should be reloaded as well</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Generate an autoincremented value</strong></span> (identity column)</p></td><td><p>User (engineer)-friendly values; Facilitates more efficient ordering by INTs that corresponds to the loading sequence</p></td><td style="background: #FFF4E6;"><p>Requires joins to dimensions to load fact tables; Reloads generate new values, so if a dimension table is reloaded, all fact tables that reference it should be reloaded as well; Inefficient to generate in distributed environments</p></td></tr>
</table>
<p><span style="color: #59a8fb;"><strong>Caution</strong></span>: Never perform a truncate and full reload of a dimension table with automatically generated surrogate keys if it's referenced by fact tables or supports SCD type 2 changes.</p>
<h2>🗑️ Dimension Member Deletions</h2>
<ul>
<li><p>Avoid synchronizing deletions with the dimension table, unless members were created in error and have no related fact records.</p></li>
</ul>
<h3>Soft Delete Approach</h3>
<p>Mark dimension members as no longer active or valid using a Boolean attribute (e.g., <code>IsDeleted</code> or <code>IsActive</code>). Update this column to <code>TRUE</code> (1) for deleted members.</p>
<h3>Current Version Tracking</h3>
<p>The current, latest version of a dimension member can be marked with a Boolean (<code>bit</code>) value in <code>IsCurrent</code> or <code>IsActive</code> columns.</p>
<h3>Reporting Filters</h3>
<p>All reporting queries and Power BI semantic models should filter out soft-deleted records to maintain <span style="color: #59a8fb;"><strong>data integrity</strong></span>.</p>
<h2>🕵️ Audit Attributes</h2>
<p><span style="color: #59a8fb;"><strong>Audit attributes</strong></span> are optional but highly recommended. They track when and how dimension records were created or modified, and can include diagnostic information from ETL processes.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Temporal Tracking</strong></span>: Track who (or what process) updated a row and when.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Diagnostics</strong></span>: Help diagnose challenging problems, like when an ETL process stops unexpectedly.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Quality Flags</strong></span>: Flag dimension members as errors or inferred members for data quality monitoring.</p></li>
</ul>
<h2>📏 Dimension Table Size Considerations</h2>
<p>The most useful and versatile dimensions are often <span style="color: #59a8fb;"><strong>big, wide dimensions</strong></span> (millions+ rows, hundreds of attributes). Size isn't the primary concern; what matters is that the dimension supports required filtering, grouping, and accurate historical analysis.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Big Dimensions</strong></span>: Sourced from multiple systems, requiring combining, merging, deduplicating, and standardizing data while assigning surrogate keys.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Small Dimensions</strong></span>: Tiny lookup tables with few records and attributes, often storing category values.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Consolidation Tip</strong></span>: When many small dimensions exist, consider consolidating them into a <span style="color: #59a8fb;"><strong>junk dimension</strong></span> to reduce clutter and improve efficiency.</p></li>
</ul>
<h2>⚖️ Denormalization vs. Normalization</h2>
<img alt="Denormalization vs. Normalization in Data Warehousing" src="images/datawarehouses/dw-038.png" style="max-width: 500px; margin-left: 0"/>
<h3>Snowflake Dimensions</h3>
<p>A <span style="color: #59a8fb;"><strong>snowflake dimension</strong></span> is a normalized dimension, storing data across several related tables.</p>
<h4>When to Use Snowflake Dimensions</h4>
<ul>
<li><p>The dimension is extremely large, and <span style="color: #59a8fb;"><strong>storage costs outweigh query performance needs</strong></span>.</p></li>
<li><p>You need keys to relate the dimension to higher-grain facts.</p></li>
<li><p>You need to track historical changes at higher levels of granularity.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Important</strong></span>: A hierarchy in a semantic model can only be based on columns from a single table. A snowflake dimension should deliver a <span style="color: #59a8fb;"><strong>denormalized result using a view</strong></span> that joins the snowflake tables together.</p></li>
</ul>
<img alt="Snowflake Dimension Example" src="images/datawarehouses/dw-039.png" style="max-width: 500px; margin-left: 0"/>
<p>The diagram shows a snowflake dimension comprising three related dimension tables: Product, Subcategory, and Category, each with specific attributes at its level of granularity.</p>
<h2>🌲 Understanding Hierarchies</h2>
<p>Dimension columns commonly produce <span style="color: #59a8fb;"><strong>hierarchies</strong></span> that enable exploring data at distinct levels of summarization (e.g., drilling down from yearly to quarterly sales).</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Single Denormalized Dimension</strong></span>: Columns from one table storing all hierarchy levels.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Snowflake Dimension</strong></span>: Multiple related tables forming hierarchy levels.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Parent-Child Relationship</strong></span>: Self-referencing dimension for unbalanced hierarchies.</p></li>
</ul>
<p>Hierarchies can be <span style="color: #59a8fb;"><strong>balanced</strong></span>, <span style="color: #59a8fb;"><strong>unbalanced</strong></span>, or <span style="color: #59a8fb;"><strong>ragged</strong></span>.</p>
<h3>Balanced Hierarchies</h3>
<p><span style="color: #59a8fb;"><strong>Balanced hierarchies</strong></span> are the most common, having the same number of levels across all branches.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Common Examples</strong></span>:</p><ul>
<li><p>Calendar hierarchy: Year <span>$\rightarrow$</span> Quarter <span>$\rightarrow$</span> Month <span>$\rightarrow$</span> Date</p></li>
<li><p>Geography hierarchy: Country <span>$\rightarrow$</span> State <span>$\rightarrow$</span> City</p></li>
<li><p>Product hierarchy: Category <span>$\rightarrow$</span> Subcategory <span>$\rightarrow$</span> Product</p></li>
</ul></li>
<li><p>Levels are based on columns from a single, denormalized dimension, or from tables that form a snowflake dimension.</p></li>
<li><p>Facts always relate to a single level, typically the lowest, allowing facts to be aggregated (rolled up) to the highest level.</p></li>
</ul>
<img alt="Balanced Hierarchy Example" src="images/datawarehouses/dw-040.png" style="max-width: 500px; margin-left: 0"/>
<h3>Unbalanced Hierarchies</h3>
<p><span style="color: #59a8fb;"><strong>Unbalanced hierarchies</strong></span> are less common and have levels based on a parent-child relationship. The number of levels is determined by the dimension rows, not specific columns, meaning different branches can have different depths.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Common Examples</strong></span>: Employee hierarchies (reporting structures), bill of materials, company ownership models, general ledger accounts.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Recommendation</strong></span>: Naturalize the hierarchy by transforming and storing hierarchy levels as columns in the dimension.</p></li>
</ul>
<img alt="Unbalanced Hierarchy Example" src="images/datawarehouses/dw-041.png" style="max-width: 500px; margin-left: 0"/>
<h3>Ragged Hierarchies</h3>
<p>A hierarchy is <span style="color: #59a8fb;"><strong>ragged</strong></span> when the parent of a member exists at a level that's not immediately above it. Missing level values repeat the value of the parent.</p>
<ul>
<li><p>Example: In a geography hierarchy, New Zealand may have no states. The country value ("New Zealand") would be repeated in the <code>StateProvince</code> column.</p></li>
</ul>
<img alt="Ragged Hierarchy Example" src="images/datawarehouses/dw-042.png" style="max-width: 500px; margin-left: 0"/>
<h2>⏳ Managing Historical Change</h2>
<p><span style="color: #59a8fb;"><strong>Slowly Changing Dimensions (SCDs)</strong></span> are mechanisms to manage how changes to dimension data are handled over time, preserving historical context.</p>
<img alt="SCD Types" src="images/datawarehouses/dw-043.png" style="max-width: 500px; margin-left: 0"/>
<h3>SCD Type 1: Overwrite</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Action</strong></span>: Overwrites the existing dimension row, as there's no need to keep track of changes. Also used to correct errors.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Impact</strong></span>: <span style="color: #59a8fb;"><strong>No history preserved</strong></span>. The existing row is updated, which can result in different higher-level aggregations for historical data.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: If a salesperson is assigned to a new region, historic sales will roll up to the new region as if they were always assigned there.</p></li>
</ul>
<img alt="SCD Type 1 Example" src="images/datawarehouses/dw-044.png" style="max-width: 500px; margin-left: 0"/>
<h3>SCD Type 2: Versioning</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Action</strong></span>: Inserts a new row representing a time-based version of a dimension member. There's always a current version.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Key Requirements</strong></span>: Requires a <span style="color: #59a8fb;"><strong>surrogate key</strong></span> because there will be duplicate natural keys. Historical tracking attributes (e.g., <code>RecValidFromKey</code>, <code>RecValidToKey</code>, <code>RecIsCurrent</code>) store validity periods.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Impact</strong></span>: <span style="color: #59a8fb;"><strong>Full history preserved</strong></span>. The granularity of related fact tables is at the member version level, allowing historic results to roll up correctly, but analysts must navigate multiple member versions.</p></li>
</ul>
<img alt="SCD Type 2 Example" src="images/datawarehouses/dw-045.png" style="max-width: 500px; margin-left: 0"/>
<h4>SCD Type 2 Implementation Details</h4>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Update Current Version</strong></span>: Set the end validity date to the ETL processing date and the current flag to <code>FALSE</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Insert New Version</strong></span>: Set the start validity date to the previous end date and the current flag to <code>TRUE</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Balance</strong></span>: Avoid too many SCD type 2 changes on a dimension, as it can complicate analysis. Consider adding frequently changing attributes to the fact table instead.</p></li>
</ul>
<h3>SCD Type 3: Limited History</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Action</strong></span>: Tracks limited history by storing previous and current values in separate columns.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Use Case</strong></span>: Useful when you only need to preserve the <span style="color: #59a8fb;"><strong>most recent change</strong></span>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Mechanism</strong></span>: Overwrites the dimension row while keeping the previous value in a dedicated column (e.g., <code>PreviousSalesRegion</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Limitations</strong></span>: Not practical in real-life due to frequent schema changes required for tracking new columns. Not commonly used in semantic models.</p></li>
</ul>
<h2>📅 Date Dimension</h2>
<p>The <span style="color: #59a8fb;"><strong>date (or calendar) dimension</strong></span> is the most common dimension, storing one row per date and supporting filtering/grouping by periods.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Natural Key</strong></span>: Should use the <code>DATE</code> data type.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Surrogate Key</strong></span>: Should store the date in <span style="color: #59a8fb;"><strong>YYYYMMDD format</strong></span> using the <code>INT</code> data type, making it human-readable, efficient, and ISO 8601 compliant.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Attributes</strong></span>: Includes columns for Year, Quarter, Month, Day, WeekOfYear, IsHoliday, HolidayText, IsWeekday, LastDayOfMonth, and relative offsets (e.g., <code>RelativeMonthOffset</code>).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Population</strong></span>: Generated beforehand (e.g., 100 years * 365 = 36,500 rows) and rarely modified. Should include future dates for targets or forecasts.</p></li>
</ul>
<img alt="Date Dimension Loading" src="images/datawarehouses/dw-046.png" style="max-width: 500px; margin-left: 0"/>
<h2>⏰ Time Dimension</h2>
<p>When facts require analysis at a specific point in time, a dedicated <span style="color: #59a8fb;"><strong>time (or clock) dimension</strong></span> is essential.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Granularity</strong></span>: Can range from minutes (1,440 rows) to seconds (86,400 rows).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Natural Key</strong></span>: Should use the <code>TIME</code> data type.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Surrogate Key</strong></span>: Consider a human-readable <code>INT</code> format like <code>HHMM</code> or <code>HHMMSS</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Attributes</strong></span>: Includes Hour, HalfHour, QuarterHour, Minute, time period labels (morning, afternoon), work shift names, and peak/off-peak flags.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Important</strong></span>: A date dimension should <span style="color: #59a8fb;"><strong>not</strong></span> include a grain that extends to time of day. Use both a date dimension and a separate time dimension.</p></li>
</ul>
<h2>🤝 Conformed Dimensions</h2>
<p><span style="color: #59a8fb;"><strong>Conformed dimensions</strong></span> are shared across multiple fact tables, delivering consistency and reducing development effort.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Common Examples</strong></span>: Date dimensions (used by nearly all fact tables) and product dimensions.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Benefit</strong></span>: Ensures consistent data analysis across different business areas.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Entity Overlap</strong></span>: When entities overlap (e.g., employees who are also system users), combine their attributes into a single conformed dimension.</p></li>
</ul>
<img alt="Conformed Dimensions Example" src="images/datawarehouses/dw-047.png" style="max-width: 500px; margin-left: 0"/>
<h2>🌌 Fact Constellation and Galaxy Schemas</h2>
<h3>Fact Constellation Schema</h3>
<p>A <span style="color: #59a8fb;"><strong>constellation schema</strong></span> consists of a set of star schemas with <span style="color: #59a8fb;"><strong>hierarchically linked fact tables</strong></span>.</p>
<ul>
<li><p>The links between various fact tables provide the ability to "drill down" between levels of detail (e.g., from Sale to Sale Item).</p></li>
</ul>
<img alt="Fact Constellation Schema Example" src="images/datawarehouses/dw-048.png" style="max-width: 500px; margin-left: 0"/>
<h3>Fact Galaxy Schema</h3>
<p>More generally, a set of star schemas or constellations can be combined to form a <span style="color: #59a8fb;"><strong>galaxy</strong></span>.</p>
<ul>
<li><p>A galaxy is a collection of star schemas with shared dimensions.</p></li>
<li><p>Unlike a constellation schema, the fact tables in a galaxy do <span style="color: #59a8fb;"><strong>not</strong></span> need to be directly related.</p></li>
</ul>
<img alt="Fact Galaxy Schema Example" src="images/datawarehouses/dw-049.png" style="max-width: 500px; margin-left: 0"/>
<h2>🎭 Role-Playing Dimensions</h2>
<p>A <span style="color: #59a8fb;"><strong>role-playing dimension</strong></span> occurs when a dimension is referenced multiple times in a fact table, with each reference representing a distinct role.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: A sales fact table may have <code>OrderDate_Date_FK</code>, <code>ShipDate_Date_FK</code>, and <code>DeliveryDate_Date_FK</code> keys, all referencing the same physical date dimension.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Another Example</strong></span>: An Airport dimension related twice to a Flight fact table as <code>Departure Airport</code> and <code>Arrival Airport</code>.</p></li>
</ul>
<img alt="Role-Playing Dimensions Example" src="images/datawarehouses/dw-050.png" style="max-width: 500px; margin-left: 0"/>
<h2>🗑️ Junk Dimensions</h2>
<p>A <span style="color: #59a8fb;"><strong>junk dimension</strong></span> consolidates many small dimensions into a single dimension. It is useful when there are many independent dimensions with few attributes and low cardinality.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Benefits</strong></span>:</p><ul>
<li><p>Reduce the number of dimensions.</p></li>
<li><p>Decrease fact table keys and storage size.</p></li>
<li><p>Reduce Data pane clutter.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Good Candidates</strong></span>: Flags and indicators, order status, customer demographic states (gender, age group).</p></li>
<li><p>A junk dimension table typically stores the <span style="color: #59a8fb;"><strong>Cartesian product</strong></span> of all dimension attribute values with a surrogate key.</p></li>
</ul>
<img alt="Junk Dimension Example" src="images/datawarehouses/dw-051.png" style="max-width: 500px; margin-left: 0"/>
<h2>👻 Degenerate Dimensions</h2>
<p>A <span style="color: #59a8fb;"><strong>degenerate dimension</strong></span> occurs when the dimension is at the same grain as the related facts. A common example is a sales order number dimension that relates to a sales fact table.</p>
<ul>
<li><p>Typically, the invoice number is a single, non-hierarchical attribute in the fact table. It's accepted practice not to copy this data to create a separate dimension table.</p></li>
<li><p>You can create a <span style="color: #59a8fb;"><strong>view</strong></span> in a Fabric Warehouse that presents the degenerate dimension as a dimension for querying purposes.</p></li>
</ul>
<img alt="Degenerate Dimension Example" src="images/datawarehouses/dw-052.png" style="max-width: 500px; margin-left: 0"/>
<h2>⛵ Outrigger Dimensions</h2>
<p>When a dimension table relates to other dimension tables, it's known as an <span style="color: #59a8fb;"><strong>outrigger dimension</strong></span>. An outrigger dimension helps to conform and reuse definitions in the dimensional model.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: A geography dimension storing geographic locations for every postal code, referenced by both customer and salesperson dimensions. This ensures consistent geographic locations for analysis.</p></li>
<li><p>The date dimension can be used as an outrigger dimension when other dimension table attributes store dates (e.g., birth date in a customer dimension using the date dimension's surrogate key).</p></li>
</ul>
<img alt="Outrigger Dimension Example" src="images/datawarehouses/dw-053.png" style="max-width: 500px; margin-left: 0"/>
<h2>↔️ Multivalued Dimensions</h2>
<p>When a dimension attribute must store multiple values, you implement a <span style="color: #59a8fb;"><strong>multivalued dimension</strong></span> using a <span style="color: #59a8fb;"><strong>bridge table (or join table)</strong></span> to store the many-to-many relationship between entities.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: If salespeople can be assigned to multiple sales regions, a bridge table stores each salesperson-region relationship, creating a logical many-to-many relationship.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Practical Approach</strong></span>: Have direct Foreign Keys (FKs) from the fact table to all combinations stemming from the many-to-many relationship (e.g., FKs to both Customer and Account).</p></li>
</ul>
<img alt="Multivalued Dimension Example" src="images/datawarehouses/dw-054.png" style="max-width: 500px; margin-left: 0"/>
<h2>🎯 Dimensions: Key Takeaways</h2>
<h3>Design Principles</h3>
<ul>
<li><p>Use <span style="color: #59a8fb;"><strong>surrogate keys</strong></span> for all dimensions.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Denormalize</strong></span> for performance and usability.</p></li>
<li><p>Include <span style="color: #59a8fb;"><strong>audit attributes</strong></span> for tracking.</p></li>
<li><p>Balance historical tracking needs with complexity.</p></li>
</ul>
<h3>Common Patterns</h3>
<ul>
<li><p>Implement <span style="color: #59a8fb;"><strong>date and time dimensions</strong></span> for temporal analysis.</p></li>
<li><p>Use <span style="color: #59a8fb;"><strong>conformed dimensions</strong></span> for consistency.</p></li>
<li><p>Apply <span style="color: #59a8fb;"><strong>SCD types</strong></span> based on business requirements.</p></li>
<li><p>Leverage <span style="color: #59a8fb;"><strong>role-playing dimensions</strong></span> when appropriate.</p></li>
</ul>
<h3>Special Considerations</h3>
<ul>
<li><p>Consolidate small dimensions into <span style="color: #59a8fb;"><strong>junk dimensions</strong></span>.</p></li>
<li><p>Naturalize <span style="color: #59a8fb;"><strong>unbalanced hierarchies</strong></span> when possible.</p></li>
<li><p>Use <span style="color: #59a8fb;"><strong>bridge tables</strong></span> for many-to-many relationships.</p></li>
<li><p>Create <span style="color: #59a8fb;"><strong>views</strong></span> for degenerate dimensions.</p></li>
</ul>
<hr/>
<h1>🏷️ Dimensional Modeling: Entity Classification</h1>
<p>Entity classification is the first step in converting an Entity Relationship (ER) model into a dimensional model for analytics and reporting. The goal is to understand the role each entity plays in analysis and prepare for building fact and dimension tables in a star schema.</p>
<h2>📈 Step 1: Classify Entities Overview</h2>
<ul>
<li><p>This initial stage helps transform complex operational models into simplified analytical models.</p></li>
<li><p>Entities are classified into three distinct categories based on how they represent business activity and context: <span style="color: #59a8fb;"><strong>Transaction, Component, and Classification Entities</strong></span>.</p></li>
</ul>
<h3>Why Classification Matters</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Identify Business Events</strong></span>: Helps pinpoint which business events decision-makers want to analyze and track.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Structure Star Schemas</strong></span>: Provides a clear structure for organizing fact tables and dimension tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Simplify Models</strong></span>: Simplifies complex operational models for analytical use while preserving essential business meaning.</p></li>
</ul>
<h2>💰 Transaction Entities</h2>
<p><span style="color: #59a8fb;"><strong>Transaction entities</strong></span> record details about specific business events that occur at a point in time. These events are typically the primary focus of analysis and represent measurable activities.</p>
<h3>Key Characteristics</h3>
<ul>
<li><p>Describe an event that happens at a <span style="color: #59a8fb;"><strong>specific moment in time</strong></span>.</p></li>
<li><p>Contain <span style="color: #59a8fb;"><strong>measurements or quantities</strong></span> (e.g., dollar amounts, weights, volumes, counts).</p></li>
<li><p>Most <span style="color: #59a8fb;"><strong>many-to-many relationships</strong></span> represent transaction entities.</p></li>
</ul>
<h3>Role in Dimensional Modeling</h3>
<ul>
<li><p>Transaction entities are the <span style="color: #59a8fb;"><strong>most important</strong></span> in a data warehouse.</p></li>
<li><p>They form the basis for constructing <span style="color: #59a8fb;"><strong>fact tables</strong></span> in star schemas.</p></li>
<li><p>User input is required to identify which transactions are relevant for analytical requirements.</p></li>
</ul>
<h3>Common Examples</h3>
<table>
<tr><th><p>Orders</p></th><th><p>Insurance Claims</p></th></tr>
<tr><td style="background: #FFF4E6;"><p>Customer purchase transactions with line items and totals</p></td><td><p>Filed claims with amounts and processing details</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Salary Payments</p></td><td><p>Hotel Bookings</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Payroll transactions with amounts and payment dates</p></td><td><p>Reservation events with rates and stay duration</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Attendance</p></td><td><p>Log In</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Entering a room</p></td><td><p>Each log in and log out event in a system</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>IoT measurements</p></td><td><p>Exam Attempt</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Measuring a specific value by a sensor at any point in time</p></td><td><p>Each exam attempt, even a failed one, is an event</p></td></tr>
</table>
<h2>🧩 Component Entities</h2>
<p><span style="color: #59a8fb;"><strong>Component entities</strong></span> are directly related to transaction entities through <span style="color: #59a8fb;"><strong>one-to-many relationships</strong></span>. They describe the individual components or dimensions that define each business event, providing essential context.</p>
<h3>Role in Dimensional Modeling</h3>
<ul>
<li><p>Component entities become <span style="color: #59a8fb;"><strong>dimension tables</strong></span> in star schemas.</p></li>
<li><p>They provide the business context for slicing, dicing, and filtering fact data.</p></li>
<li><p>They answer fundamental analytical questions: <span style="color: #59a8fb;"><strong>who, what, when, where, how, and why</strong></span> for each transaction.</p></li>
</ul>
<table>
<tr><th><p>Customer</p></th><th><p>Product</p></th></tr>
<tr><td style="background: #FFF4E6;"><p>Who made the purchase or participated in the event</p></td><td><p>What was sold or what item was involved</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Location</p></td><td><p>Period</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Where the transaction occurred or was processed</p></td><td><p>When the transaction took place in time</p></td></tr>
</table>
<p><span style="color: #59a8fb;"><strong>Important Note</strong></span>: Time is a critical component entity because historical analysis is a core requirement of data warehouses. Every fact table should include time dimensions for trend analysis.</p>
<h2>🏷️ Classification Entities</h2>
<p><span style="color: #59a8fb;"><strong>Classification entities</strong></span> are related to component entities through chains of <span style="color: #59a8fb;"><strong>one-to-many relationships</strong></span>. They are functionally dependent on component entities, representing hierarchical structures.</p>
<h3>Purpose</h3>
<ul>
<li><p>Represent <span style="color: #59a8fb;"><strong>hierarchies</strong></span> embedded within the data model.</p></li>
<li><p>Capture classification and grouping structures such as categories and levels.</p></li>
<li><p>Enable <span style="color: #59a8fb;"><strong>drill-down and roll-up analysis</strong></span> paths.</p></li>
<li><p>If data is suitable for a low-cardinality dropdown in a UI, it's likely a Classification entity.</p></li>
</ul>
<h3>Role in Dimensional Modeling</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Collapse Hierarchies</strong></span>: Classification entities can be collapsed into component entities when creating dimension tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Support Analysis</strong></span>: They support hierarchical analysis such as roll-ups and drill-downs across levels.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Preserve Meaning</strong></span>: They simplify the analytical model while preserving business meaning and relationships.</p></li>
</ul>
<img alt="Classification Entity Examples" src="images/datawarehouses/dw-055.png" style="max-width: 500px; margin-left: 0"/>
<h2>🧐 Resolving Ambiguities</h2>
<p>When an entity fits into multiple categories, a <span style="color: #59a8fb;"><strong>precedence hierarchy</strong></span> is used:</p>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Transaction Entity</strong></span> (highest precedence)</p></li>
<li><p><span style="color: #59a8fb;"><strong>Classification Entity</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Component Entity</strong></span> (lowest precedence)</p></li>
</ol>
<p>This hierarchy determines an entity's primary role in a star schema.</p>
<img alt="Precedence Hierarchy" src="images/datawarehouses/dw-056.png" style="max-width: 500px; margin-left: 0"/>
<h2>🌲 Hierarchies</h2>
<p><span style="color: #59a8fb;"><strong>Hierarchies</strong></span> are crucial in dimensional modeling, forming the primary basis for deriving dimensional models from ER models. Most dimension tables embed these hierarchies. An ER model hierarchy is a sequence of entities joined by one-to-many relationships, aligned in the same direction.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Parent/Child</strong></span>: State is the parent of Region; Region is the child of State.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Descendants</strong></span>: Sale Item, Sale, Sale Location, Region are all descendants of State.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ancestors</strong></span>: Sale, Sale Location, Region, State are all ancestors of Sale Item.</p></li>
</ul>
<img alt="ER Diagram with Hierarchies" src="images/datawarehouses/dw-057.png" style="max-width: 500px; margin-left: 0"/>
<h3>Maximal Hierarchy</h3>
<p>A hierarchy is <span style="color: #59a8fb;"><strong>maximal</strong></span> if it cannot be extended further upwards or downwards, capturing the complete scope of a business relationship.</p>
<h3>Minimal Entity</h3>
<p>An entity is <span style="color: #59a8fb;"><strong>minimal</strong></span> if it resides at the very bottom of a maximal hierarchy, possessing no further one-to-many relationships pointing away from it ("leaf" entities).</p>
<h3>Maximal Entity</h3>
<p>An entity is <span style="color: #59a8fb;"><strong>maximal</strong></span> if it is positioned at the top of a maximal hierarchy, meaning it has no further many-to-one relationships leading to it ("root" entities).</p>
<h3>Entity Hierarchies Example</h3>
<p>From an example data model, we can identify:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Minimal Entities</strong></span>: Sale Item and Sale Fee (2 entities).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Maximal Entities</strong></span>: Period, CustomerType, State, Location Type, Product Type, and Fee Type (6 entities).</p></li>
</ul>
<img alt="Entity Hierarchies ERD" src="images/datawarehouses/dw-058.png" style="max-width: 500px; margin-left: 0"/>
<p>These hierarchies define detailed relationships and lineage, providing a structured view for analysis.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Product Hierarchies</strong></span>: Product-type <span>$\rightarrow$</span> Product <span>$\rightarrow$</span> Sale-item; Fee-type <span>$\rightarrow$</span> Sale-fee.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Customer Hierarchies</strong></span>: State <span>$\rightarrow$</span> Region <span>$\rightarrow$</span> Customer <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item); Customer-type <span>$\rightarrow$</span> Customer <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Location Hierarchies</strong></span>: Location-type <span>$\rightarrow$</span> Location <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item); State <span>$\rightarrow$</span> Region <span>$\rightarrow$</span> Location <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Time Hierarchies</strong></span>: Period(sale-date) <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item); Period(posted-date) <span>$\rightarrow$</span> Sale <span>$\rightarrow$</span> Sale-fee (and Sale-item).</p></li>
</ul>
<h2>🔨 Producing Dimensional Models</h2>
<p>Dimensional modeling employs specialized operators to transform ER models into star schemas, optimizing data for analytical queries.</p>
<h3>Operator 1: Collapse Hierarchy</h3>
<p>This foundational operator consolidates attributes from a higher-level entity into a lower-level entity within a one-to-many hierarchy.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Process</strong></span>: A deliberate act of <span style="color: #59a8fb;"><strong>denormalization</strong></span>, introducing redundancy to create flatter, more performant dimension tables.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: Attributes of a 'State' entity (State ID, State Name) are absorbed into the 'Region' entity, creating a single, broader dimension.</p></li>
</ul>
<img alt="Collapsing State into Region" src="images/datawarehouses/dw-059.png" style="max-width: 500px; margin-left: 0"/>
<img alt="Collapsing State and Region into Location" src="images/datawarehouses/dw-060.png" style="max-width: 500px; margin-left: 0"/>
<h3>Operator 2: Aggregation</h3>
<p>The <span style="color: #59a8fb;"><strong>aggregation operator</strong></span> is applied to a transaction entity to create a new entity containing summarized data.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Process</strong></span>: Involves selecting a subset of <span style="color: #59a8fb;"><strong>numerical attributes</strong></span> to aggregate and another subset of attributes to group by.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: Applying aggregation to a <code>Sale Item</code> entity to create a <code>Product Summary</code> entity (e.g., total sales amount, average quantity per order, average price per item on a daily basis).</p><ul>
<li><p><span style="color: #59a8fb;"><strong>Aggregation Attributes</strong></span>: Quantity, Price.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Grouping Attributes</strong></span>: Product ID, Sale Date.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Important</strong></span>: Aggregation inherently involves a <span style="color: #59a8fb;"><strong>loss of detailed information</strong></span>. Once data is summarized, it's not possible to reconstruct individual details.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Consequence</strong></span>: In ETL, one fact table is usually kept at the lowest granularity, and then other aggregate fact tables are created.</p></li>
</ul>
<img alt="Numerical Aggregation Example" src="images/datawarehouses/dw-061.png" style="max-width: 500px; margin-left: 0"/>
<hr/>
<h1>📊 Dimensional Modeling: Fact Tables</h1>
<p>Fact tables are the core of a dimensional model, storing measurable business metrics and linking to dimension tables for context. They are typically narrow (few columns) but immense in terms of rows (billions+).</p>
<h2>📝 Fact Table Structure</h2>
<p>Consider a sales fact table named <code>f_Sales</code> as an example of good design practices:</p>
<pre><code class="language-sql">CREATE TABLE f_Sales (
    -- Dimension keys
    OrderDate_Date_FK INT NOT NULL,
    ShipDate_Date_FK INT NOT NULL,
    Product_FK INT NOT NULL,
    Salesperson_FK INT NOT NULL,
    -- Attributes
    SalesOrderNo INT NOT NULL,
    SalesOrderLineNo SMALLINT NOT NULL,
    -- Measures
    Quantity INT NOT NULL,
    -- Audit attributes
    AuditMissing BIT NOT NULL,
    AuditCreatedDate DATE NOT NULL,
    AuditCreatedBy VARCHAR(15) NOT NULL,
    AuditLastModifiedDate DATE NOT NULL,
    AuditLastModifiedBy VARCHAR(15) NOT NULL
);</code></pre>
<h3>Primary Key and Dimension Keys</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Primary Key</strong></span>: Fact tables usually <span style="color: #59a8fb;"><strong>do not have an explicit primary key</strong></span>. It often doesn't serve a useful purpose and increases storage size unnecessarily. The primary key is often implied by the set of dimension keys and attributes.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Dimension Keys</strong></span>: References to the surrogate keys (or higher-level attributes) in related dimensions. An unusual fact table would not include at least one date dimension key.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Role-Playing Dimension</strong></span>: A fact table can reference a dimension multiple times. For example, <code>OrderDate_Date_FK</code> and <code>ShipDate_Date_FK</code> both reference the same physical date dimension, each playing a distinct role.</p></li>
</ul>
<h3>Attributes, Measures, and Audit Attributes</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Attributes</strong></span>: Provide additional information and set the granularity of fact data, but are neither dimension keys nor dimension attributes, nor measures. Examples include sales order numbers or tracking numbers. An attribute can form a <span style="color: #59a8fb;"><strong>degenerate dimension</strong></span> for analysis.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Measures</strong></span>: Typically numeric and commonly <span style="color: #59a8fb;"><strong>additive</strong></span> (can be summed and summarized). The <code>Quantity</code> column in the example is a measure.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Audit Attributes</strong></span>: Optional attributes that track when and how fact records were created or modified, and can include diagnostic information from ETL processes.</p></li>
</ul>
<h2>📏 Fact Table Size and Design Concepts</h2>
<p>Fact tables vary in size based on dimensionality, granularity, number of measures, and amount of history. They are typically <span style="color: #59a8fb;"><strong>narrow</strong></span> (fewer columns) but <span style="color: #59a8fb;"><strong>big or immense</strong></span> in terms of rows (exceeding billions).</p>
<h3>Three Types of Fact Tables</h3>
<ol>
<li><p><span style="color: #59a8fb;"><strong>Transaction fact tables</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Periodic snapshot fact tables</strong></span></p></li>
<li><p><span style="color: #59a8fb;"><strong>Accumulating snapshot fact tables</strong></span></p></li>
</ol>
<h3>Measure Types</h3>
<p>Measures are typically numeric and commonly additive. However, some measures are <span style="color: #59a8fb;"><strong>semi-additive</strong></span> or <span style="color: #59a8fb;"><strong>non-additive</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Additive Measures</strong></span>: Can be summed across any dimension (e.g., order quantity, sales revenue in a single currency).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Semi-Additive Measures</strong></span>: Can be summed across certain dimensions only.</p><ul>
<li><p>Any measure in a periodic snapshot fact table cannot be summed across other time periods.</p></li>
<li><p>A stock balance measure in an inventory fact table cannot be summed across other products.</p></li>
<li><p>Sales revenue with a currency dimension key cannot be summed across currencies.</p></li>
</ul></li>
<li><p><span style="color: #59a8fb;"><strong>Non-Additive Measures</strong></span>: Cannot be summed across any dimension (e.g., temperature reading, rates, ratios). These can still be aggregated using count, distinct count, minimum, maximum, or average.</p></li>
</ul>
<h2>🛒 Transaction Fact Tables</h2>
<p>A <span style="color: #59a8fb;"><strong>transaction fact table</strong></span> stores business events or transactions. Each row stores facts in terms of dimension keys and measures, and optionally other attributes. All data is fully known when inserted and never changes (except for error correction).</p>
<ul>
<li><p>Typically store facts at the <span style="color: #59a8fb;"><strong>lowest possible level of granularity</strong></span>.</p></li>
<li><p>Contain measures that are <span style="color: #59a8fb;"><strong>additive</strong></span> across all dimensions.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: A sales fact table storing every sales order line.</p></li>
</ul>
<img alt="Transaction Fact Table Example" src="images/datawarehouses/dw-062.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><code>fact_sale</code> has the granularity of the most granular table in the source database (e.g., <code>sales_order_details</code>, <code>sales_items</code>).</p></li>
</ul>
<h2>📸 Periodic Snapshot Fact Tables</h2>
<p>A <span style="color: #59a8fb;"><strong>periodic snapshot fact table</strong></span> stores measurements at a predefined time or specific intervals. It provides a summary of key metrics over time and is useful for trend analysis. Measures are always <span style="color: #59a8fb;"><strong>semi-additive</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Example</strong></span>: An inventory fact table loaded daily with the end-of-day stock balance of every product.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Use Case</strong></span>: Used when recording large volumes of transactions is expensive and does not support useful analytical requirements, focusing on trends rather than individual transactions.</p></li>
</ul>
<img alt="Periodic Snapshot Fact Table Example" src="images/datawarehouses/dw-063.png" style="max-width: 500px; margin-left: 0"/>
<h2>🔄 Accumulating Snapshot Fact Tables</h2>
<p>An <span style="color: #59a8fb;"><strong>accumulating snapshot fact table</strong></span> stores measurements that accumulate across a well-defined period or workflow. It often records the state of a business process at distinct stages or milestones, which might take days, weeks, or months to complete.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Initial Event</strong></span>: A fact row is loaded soon after the first event in a process.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Milestone Updates</strong></span>: The row is updated in a predictable sequence every time a milestone event occurs.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Process Completion</strong></span>: Updates continue until the process completes.</p></li>
</ul>
<img alt="Accumulating Snapshot Fact Table Process" src="images/datawarehouses/dw-064.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p>Have <span style="color: #59a8fb;"><strong>multiple date dimension keys</strong></span>, each representing a milestone event.</p></li>
<li><p>Some dimension keys might record an <code>N/A</code> state until a certain milestone is reached.</p></li>
<li><p>Measures typically record <span style="color: #59a8fb;"><strong>durations</strong></span> between milestones, providing valuable insight into business workflows.</p></li>
</ul>
<img alt="Accumulating Snapshot Fact Table ERD" src="images/datawarehouses/dw-065.png" style="max-width: 500px; margin-left: 0"/>
<h2>👻 Factless Fact Tables</h2>
<p>A <span style="color: #59a8fb;"><strong>factless fact table</strong></span> does not contain any measure columns. It typically records events or occurrences (e.g., students attending class). From an analytics perspective, a measurement can be achieved by counting fact rows.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Purpose</strong></span>: Records the occurrence of an event or condition with no numeric measures.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Examples</strong></span>: "customer viewed product in store on date", "customer eligible for promotion in store on date", "customer-product-store had at least one touchpoint".</p></li>
</ul>
<img alt="Factless Fact Table Example" src="images/datawarehouses/dw-066.png" style="max-width: 500px; margin-left: 0"/>
<pre><code>| dim_customer   |              | fact_customer_product_store_event   |              | dim_store       |              |
|----------------|--------------|-------------------------------------|--------------|-----------------|--------------|
| customer_skey  | int          | customer_skey                       | int          | store_skey      | int          |
| customer_code  | varchar(50)  | product_skey                        | int          | store_code      | varchar(50)  |
| full_name      | varchar(200) | store_skey                          | int          | store_name      | varchar(200) |
| segment        | varchar(50)  | event_type_skey                     | int          | city            | varchar(100) |
|                |              | event_ts                            | datetime     | region          | varchar(100) |
|                |              | source system                       | varchar(50)  |                 |              |
| dim_product    |              | source_event_id                     | varchar(100) | dim_event_type  |              |
