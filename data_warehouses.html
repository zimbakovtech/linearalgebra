<h2>🌌 Шема на соѕвездија на факти и шема за галаксија на факти</h2>
<h3>Шема на констелација на факти</h3>
<p>Збирната табела со факти претставува збир на основна табела со факти до помала димензионалност и/или поголема грануларност. Неговата цел е да ги забрза перформансите на барањето за димензиите кои најчесто се прашуваат.</p>
<ul>
<li><p>Се состои од збир на шеми со ѕвезди со <span style="color: #59a8fb;"><strong>хиерархиски поврзани табели со факти</strong></span>.</p></li>
<li><p>Врските помеѓу табелите со факти обезбедуваат можност за <span style="color: #59a8fb;"><strong>дупчат</strong></span> помеѓу нивоата на детали (на пр., од Продажба до артикал за продажба).</p></li>
</ul>
<img alt="Пример за шема на констелација на факти" src="images/datawarehouses/dw-067.png" style="max-width: 500px; margin-left: 0"/>
<h3>Факт Галакси Шема</h3>
<p>Поопшто, збир на шеми на ѕвезди или соѕвездија може да се комбинираат за да формираат a <span style="color: #59a8fb;"><strong>галаксија</strong></span>.</p>
<ul>
<li><p>Галаксија е збирка шеми на ѕвезди со <span style="color: #59a8fb;"><strong>споделени димензии</strong></span>.</p></li>
<li><p>За разлика од шемата за соѕвездија, табелите на фактите во галаксијата <span style="color: #59a8fb;"><strong>не треба да бидат директно поврзани</strong></span>.</p></li>
</ul>
<img alt="Факт Галакси Шема Пример" src="images/datawarehouses/dw-068.png" style="max-width: 500px; margin-left: 0"/>
<hr/>
<h1>📥 Димензионално моделирање: Димензии и факти за вчитување</h1>
<p>Вчитувањето на димензионален модел вклучува периодично водење на <span style="color: #59a8fb;"><strong>Процесот на екстракција, трансформација и вчитување (ETL).</strong></span>. Овој процес го оркестрира поставувањето на изворните податоци, синхронизацијата на податоците за димензиите, вметнувањето редови во табелите со факти и евидентирањето на ревизорските податоци и грешки.</p>
<img alt="ETL процес за димензионален модел" src="images/datawarehouses/dw-069.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Цевководи</strong></span>: Изградете работни текови за оркестрирање на ETL процесот, извршување на SQL скрипти, складирани процедури итн.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Текови на податоци</strong></span>: Развијте логика со низок код за да внесувате податоци од стотици извори користејќи го искуството со Power Query.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Развој на ETL</strong></span>: Може да биде комплексен и предизвикувачки, често троши 60-80% од напорите за развој на складиште за податоци.</p></li>
</ul>
<h2>⚙️ Оркестрација</h2>
<p>Општиот работен тек на ETL процес следи структурирана низа:</p>
<table>
<tr><th><p>01</p></th><th><p>02</p></th></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Вчитај табели за поставување на сцена</strong></span></p></td><td><p><span style="color: #59a8fb;"><strong>Табели со димензии на процесот</strong></span></p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Изборно извлечете и исценирајте ги изворните податоци за обработка</p></td><td><p>Синхронизирајте ги податоците за димензијата и справувајте се со историските промени</p></td></tr>
<tr><td style="background: #FFF4E6;"><p>03</p></td><td><p>04</p></td></tr>
<tr><td style="background: #FFF4E6;"><p><span style="color: #59a8fb;"><strong>Табели со факти за процесот</strong></span></p></td><td><p><span style="color: #59a8fb;"><strong>Задачи по обработката</strong></span></p></td></tr>
<tr><td style="background: #FFF4E6;"><p>Вчитајте податоци за фактите со соодветно пребарување на копчињата за димензија</p></td><td><p>Активирајте освежувања и испраќајте известувања</p></td></tr>
</table>
<img alt="Работен тек на процесот на ETL" src="images/datawarehouses/dw-070.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Табели со димензии</strong></span> прво треба да се обработи, особено кога има зависности (на пр., димензијата за подигање како географијата мора да се обработи пред димензиите на купувачот и продавачот).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Табели со факти</strong></span> може да се обработи откако ќе се завршат сите табели со димензии.</p></li>
<li><p>Пост-обработката вклучува активирање на освежување на семантичките модели и испраќање известувања за исходот на ETL.</p></li>
</ul>
<h2>стационарни податоци 🚧</h2>
<p>Станирањето на податоците е посреднички чекор во процесот на ETL, каде суровините изворни податоци привремено се складираат пред трансформацијата и вчитувањето во складиштето на податоци.</p>
<img alt="Придобивки од подредување податоци" src="images/datawarehouses/dw-071.png" style="max-width: 500px; margin-left: 0"/>
<h3>Алтернативи за виртуелизација на податоци</h3>
<p>Размислете за виртуелизација на податоците за да го намалите движењето на податоците и да ја подобрите ефикасноста:</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Пресликување</strong></span>: Ефтино решение со мала латентност што создава реплика на вашите податоци во OneLake.</p></li>
<li><p><span style="color: #59a8fb;"><strong>PolyBase во SQL Server</strong></span>: Дозволува T-SQL барањата да ги спојат податоците од надворешни извори во релациони табели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Кратенки на OneLake</strong></span>: Посочете кон други локации за складирање што содржат изворни податоци, што може да се користат како табели во T-SQL пребарувања.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Управуван примерок на Azure SQL</strong></span>: Извршете T-SQL барања за датотеки во Azure Data Lake Storage Gen2 или Azure Blob Storage и комбинирајте со локално складирани релациски податоци.</p></li>
</ul>
<h2>🔄 Трансформирајте податоци</h2>
<p>Структурата на изворните податоци често се разликува од дестинационите структури на табелите со димензионални модели. Процесот на ETL мора да ги преобликува и трансформира изворните податоци за да обезбеди <span style="color: #59a8fb;"><strong>квалитет и конзистентност</strong></span>.</p>
<ul>
<li><p>Важи „Garbage in, garbage out“: избегнувајте вчитување податоци со низок квалитет во табели со димензионални модели.</p></li>
</ul>
<h3>Клучни трансформациски активности</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Комбинирајте податоци</strong></span>: Интегрирајте податоци од различни извори врз основа на соодветни клучеви или додајте податоци што споделуваат заедничка структура (на пр., спојување на податоците за производот со користење на SKU, обединување на податоци за продажба).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Откријте историска промена</strong></span>: Откријте и соодветно складирајте ги промените во табелите со димензии за да ја одржите историската точност (типови SCD).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Конвертирај типови на податоци</strong></span>: Конвертирајте ги типовите на податоци за да се усогласат со табелите со димензионални модели.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Збирни податоци</strong></span>: Намалете ја димензионалноста на табелата со факти или подигнете ја грануларноста на фактите (на пр., групирање на продажбата по клучеви за димензии без складирање на броеви на нарачки за продажба).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пресметки</strong></span>: Направете вредности за табелите со димензионални модели (на пр., спојте ги имињата и презимето за целото име, пресметајте ги бруто приходите од продажба).</p></li>
</ul>
<h2>⬆️ Вчитај податоци</h2>
<p>Достапни се различни опции за внесување податоци за вчитување табели во складиште за ткаенини, секоја погодна за различни сценарија.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong><code>COPY INTO</code></strong></span><span style="color: #59a8fb;"><strong> (T-SQL)</strong></span>: Корисно за паркет или CSV датотеки складирани во надворешни сметки за складирање на Azure (ADLS Gen2, складирање на Azure Blob).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Текови на податоци</strong></span>: Обезбедете искуство без код за трансформирање и чистење на податоците со интуитивен интерфејс.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Цевководи</strong></span>: Може да вклучува активности што извршуваат T-SQL изјави, вршат пребарување или копирање податоци од извор до дестинација.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Вкрстено-магацинско голтање</strong></span>: Кога податоците се зачувани во истиот работен простор, овозможува спојување на различни магацински или езерски табели. Поддржува <code>INSERT...SELECT</code>, <code>SELECT INTO</code>, и <code>CREATE TABLE AS SELECT</code> (CTAS) команди за ефикасни операции базирани на множества.</p></li>
</ul>
<h2>📝 Сеча</h2>
<p>ETL процесите бараат посветен мониторинг и одржување. Се препорачува евидентирање на резултатите од процесот ETL во табели со недимензионални модели во вашиот магацин.</p>
<h3>ETL Процес логирање</h3>
<ul>
<li><p>Единствен ID за секое извршување.</p></li>
<li><p>Време на почеток и крај.</p></li>
<li><p>Статус (успех или неуспех).</p></li>
<li><p>Сите наидени грешки.</p></li>
</ul>
<h3>Евиденција на ниво на табела</h3>
<ul>
<li><p>Време на почеток и крај.</p></li>
<li><p>Индикатори за статус.</p></li>
<li><p>Редовите се вметнати, ажурирани, избришани.</p></li>
<li><p>Конечно броење на редови на табелата.</p></li>
<li><p>Детали за грешка.</p></li>
</ul>
<p>Семантички модел посветен на следење на процесите на ETL може да помогне да се идентификуваат тесните грла и да се предвиди идната големина на складиштето на податоци.</p>
<h3>Операција логирање</h3>
<ul>
<li><p>Време на почеток и крај на операциите за освежување на семантичкиот модел.</p></li>
<li><p>Метрика на перформанси.</p></li>
<li><p>Искористување на ресурсите.</p></li>
</ul>
<h2>🌳 Табели со димензии на процесот</h2>
<p>Обработката на табелата со димензии вклучува синхронизирање на податоците од складиштето на податоци со изворните системи. Изворните податоци се трансформираат, подготвуваат и потоа се совпаѓаат со постоечките податоци од табелата со димензии со приклучување <span style="color: #59a8fb;"><strong>деловни клучеви</strong></span>.</p>
<img alt="Обработка на табела со димензии" src="images/datawarehouses/dw-072.png" style="max-width: 500px; margin-left: 0"/>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Нови производи</strong></span>: Редовите се вметнуваат во табелата со димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Изменети производи</strong></span>: Постојните редови или се ажурираат (SCD тип 1) или се вметнува нова верзија и постоечката е истечена (SCD тип 2).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Историско следење</strong></span>: SCD тип 2 истекува на тековните верзии и вметнува нови верзии.</p></li>
</ul>
<h2>📊 Табели со факти за процесот</h2>
<p>Обработката на табела со факти вклучува синхронизирање на податоците со фактите на изворниот систем. Изворните податоци се трансформираат и за секој клуч за димензија, пребарувањето ја одредува сурогатната вредност на клучот што треба да се складира во редот со факти.</p>
<img alt="Обработка на табела со факти" src="images/datawarehouses/dw-073.png" style="max-width: 500px; margin-left: 0"/>
<h3>Пребарувања на клучните димензии</h3>
<ul>
<li><p>Кога димензија поддржува SCD тип 2, сурогат клучот за <span style="color: #59a8fb;"><strong>тековна верзија</strong></span> на членот на димензијата треба да се извади.</p></li>
<li><p>За димензиите на датумот и времето, сурогатниот клуч често може да се пресмета (на пр., YYYYMMDD или HHMM формат).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Проверка на интегритет</strong></span>: Со оглед на тоа што многу DW системи не спроведуваат странски клучеви, процесот ETL мора да провери дали има интегритет при вчитување на табели со факти.</p></li>
</ul>
<h3>Ракување со неуспеси во пребарувањето</h3>
<ul>
<li><p>Ако пребарувањето на клучот за димензија не успее (што укажува на проблем со интегритетот на изворниот систем), редот со факти сепак мора да се вметне со важечки клуч за димензија.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пристап 1</strong></span>: Чувајте посебен член на димензија како <code>Unknown</code>.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Пристап 2</strong></span>: Ако природниот клуч е валиден, вметнете нов член за димензија и зачувајте го неговиот сурогат клуч.</p></li>
</ul>
<h3>Инкрементално наспроти целосно повторно вчитување</h3>
<ul>
<li><p>Секогаш кога е можно, треба да се вчита табела со факти <span style="color: #59a8fb;"><strong>постепено</strong></span> (откриени и вметнати нови факти). Ова е поскалабилно и го намалува обемот на работа.</p></li>
<li><p>Скратувањето и повторното вчитување на голема табела со факти треба да биде a <span style="color: #59a8fb;"><strong>последно средство</strong></span> поради трошоците, ресурсите и сложеноста со димензиите на SCD тип 2.</p></li>
</ul>
<h3>Откривање на нови факти</h3>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Изворни системски идентификатори/временски печати</strong></span>: Потпрете се на нив за ефикасно откривање нови факти (на пр., зачувување на најновиот број на нарачка за продажба како висок воден печат).</p></li>
<li><p><span style="color: #59a8fb;"><strong>Промена на снимање на податоци (CDC)</strong></span>: SQL Server и Azure SQL Managed Instance нудат CDC за следење на промените во редовите.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Креирајте колони за датум</strong></span>: Може со сигурност да открие нови нарачки.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Активатори на база на податоци</strong></span>: Додајте предизвикувачи на релациони табели кои складираат клучеви од вметнати, ажурирани или избришани записи за ефикасно откривање промени.</p></li>
</ul>
<h3>Заклучени членови на димензија</h3>
<p>Кога процесот на оптоварување факти вметнува нов член на димензија, тој е познат како an <span style="color: #59a8fb;"><strong>заклучен член</strong></span>.</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Почетно создавање</strong></span>: Познат е само природниот клуч; процесот на оптоварување факти создава нова димензија член со <code>Unknown</code> вредности на атрибутите.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Детали за доцна пристигнување</strong></span>: Кога деталите ќе пристигнат подоцна, процесот на вчитување на димензијата го ажурира редот со димензии.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Означете како заклучено</strong></span>: Поставете атрибут за ревизија како <code>IsInferredMember</code> до <code>TRUE</code>.</p></li>
</ul>
<h2>✏️ Ажурирања или бришења на факти</h2>
<p>Можеби ќе треба да ги ажурирате или избришете податоците за факти (на пр., откажани нарачки за продажба, променети количини на нарачки).</p>
<ul>
<li><p><span style="color: #59a8fb;"><strong>Стратегија за меки бришења</strong></span>: за откажани нарачки, променете го статусот на нарачката за продажба (на пр., од <code>Open</code> до <code>Canceled</code>) наместо да го избришете редот. Ова ја зачувува историјата.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Атрибути за идентификација</strong></span>: Вклучете атрибути како број на нарачка за продажба и број на линија во табелата со факти за да помогнете да се идентификуваат редовите за измена. Индексирајте ги овие колони за ефикасни операции.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Ажурирања за количина</strong></span>: За промени во количината, неопходно е ажурирање на мерката количина на редот факти.</p></li>
<li><p><span style="color: #59a8fb;"><strong>Периодична обработка</strong></span>: Ако податоците за фактите се вметнати со помош на <code>Unknown</code> член на димензија, извршете периодичен процес за враќање на тековните изворни податоци и ажурирање на клучевите за димензија до валидни вредности.</p></li>
</ul>
<p>Сите барања за известување и семантичките модели на Power BI треба да ги филтрираат меко избришаните записи за да обезбедат точно известување.</p>
